function saveEditProducao(id){
  const p=S.producao.find(x=>x.id===id); if(!p) return;
  const novoNome  = document.getElementById('ep-nome')?.value.trim();
  const novaQtd   = parseInt(document.getElementById('ep-qtd')?.value)||1;
  const novoTempo = parseFloat(document.getElementById('ep-tempo')?.value)||1;
  const novoMat   = document.getElementById('ep-mat')?.value;
  const novaCor   = document.getElementById('ep-cor')?.value.trim();
  const novoGr    = parseFloat(document.getElementById('ep-gramas')?.value)||0;
  const novoPreco = parseFloat(document.getElementById('ep-preco')?.value)||0;
  const novoFilId = parseInt(document.getElementById('ep-fil')?.value);
  const novaData  = document.getElementById('ep-data')?.value;
  if(!novoNome){toast('Informe o nome do produto!','err');return;}

  // Reverte estoque e filamento antigos
  const exOld=S.estoque.find(e=>e.produto.toLowerCase()===p.produto.toLowerCase());
  if(exOld) exOld.qtd=Math.max(0,exOld.qtd-p.qtd);
  if(p.filamento_id) reverterFilamento(p.filamento_id,p.gramasTotal||0);

  // Aplica novos valores
  const novoGramasTotal=+(novaQtd*novoGr).toFixed(2);
  p.produto=novoNome; p.qtd=novaQtd; p.tempo=novoTempo;
  p.material=novoMat; p.cor=novaCor; p.gramas=novoGr;
  p.gramasTotal=novoGramasTotal; p.preco_venda=novoPreco;
  p.filamento_id=novoFilId; p.data=novaData;

  // Atualiza estoque com novo nome e quantidade
  const exNew=S.estoque.find(e=>e.produto.toLowerCase()===novoNome.toLowerCase());
  if(exNew){ exNew.qtd+=novaQtd; exNew.preco=novoPreco||exNew.preco; }
  else S.estoque.push({id:S.nextId++,produto:novoNome,qtd:novaQtd,material:novoMat,preco:novoPreco});

  // Desconta novo filamento
  const filNovo=S.filamentos.find(f=>f.id===novoFilId);
  if(filNovo) filNovo.peso_restante=Math.max(0,+(filNovo.peso_restante-novoGramasTotal).toFixed(2));

  save();closeModalD();toast(`Lançamento atualizado!`);render();
}

// ══════════════════════════════════════════════
// MÓDULO PRECIFICAÇÃO — Fórmula FDM V2.5 debugada
// ══════════════════════════════════════════════
S.impressoras = S.impressoras || [
  // BambuLab A1 — LINHA 1 da Tabela_impressoras (VLOOKUP retorna a primeira!)
  // meses=10 | hrs=20 | dias=25 | Profissional=30% | falhas=5% | tarifa=0.95
  // DEP_CONST=2058.333333 (named range "Depreciação" célula BK11)
  {id:1,marca:'Bambu Lab A1',valor:5500,meses_retorno:10,hrs_dia:20,dias_mes:25,potencia_kw:0.5,nivel_desgaste:30,perc_falhas:5,tarifa_kwh:0.95,dep_const:2058.333333},
];
S.db_precificacao = S.db_precificacao || [];
S.nextPrecId = S.nextPrecId || 500;

function calcPreco(inp) {
  const imp = S.impressoras.find(i=>i.id===inp.impressora_id)||S.impressoras[0];
  const fil = S.filamentos.find(f=>f.id===inp.filamento_id)||S.filamentos[0];
  if(!imp||!fil) return null;

  const tempo = inp.tempo_hrs || 1;
  const peso_gr = inp.gramas_gastas || 0;

  // Parâmetros da impressora (com fallbacks seguros)
  const imp_valor   = imp.valor         || 5500;
  const imp_meses   = imp.meses_retorno || 10;
  const imp_hrs     = imp.hrs_dia       || 15;
  const imp_dias    = imp.dias_mes      || 20;
  const imp_pot     = imp.potencia_kw   || 0.5;
  const imp_tarifa  = imp.tarifa_kwh    || 0.95;
  const imp_falhas  = imp.perc_falhas   || 5;
  const imp_desgaste= imp.nivel_desgaste|| 30; // % desgaste (Profissional=30)
  const DEPRECIACAO_CONST = imp.dep_const || 2058.333333;

  // ── CUSTO MATERIAL ──
  // Se multicolor: custo já vem calculado (soma de gramas×custo/g de cada filamento)
  const custo_material = inp.custo_material_override != null
    ? inp.custo_material_override
    : (fil.preco / fil.peso_total) * peso_gr;

  // ── CUSTO ENERGIA ──
  // = tempo * potencia * tarifa
  const custo_energia = tempo * imp_pot * imp_tarifa;

  // ── CUSTO MANUTENÇÃO (fórmula EXATA planilha Viviane) ──
  // = (valor_maquina * nivel_desgaste / Hr_ano) * tempo
  // onde Hr_ano = hrs_dia * dias_mes * 12
  const hr_ano = imp_hrs * imp_dias * 12;
  const custo_manutencao = (imp_valor * (imp_desgaste/100) / hr_ano) * tempo;

  // ── RETORNO DO INVESTIMENTO (fórmula EXATA planilha) ──
  // = (valor / (meses * hrs_dia * dias_mes)) * tempo
  const val_add_hr = imp_valor / (imp_meses * imp_hrs * imp_dias);
  const custo_roi = val_add_hr * tempo;

  // ── CUSTO FALHAS ──
  const custo_falhas = custo_material * (imp_falhas / 100);

  // ── CUSTO DEPRECIAÇÃO (fórmula EXATA planilha) ──
  // = Uso_Estimado_Anual / DEPRECIACAO_CONST
  // onde Uso_Estimado_Anual = meses * hrs * dias
  const uso_estimado_anual = imp_meses * imp_hrs * imp_dias;
  const custo_dep = uso_estimado_anual / DEPRECIACAO_CONST;

  // ── HORA OPERADOR ──
  const custo_hora_op = (inp.custo_hora ?? 0.5) * (inp.hrs_trabalhadas ?? 1);

  // ── CUSTOS ADICIONAIS ──
  const custo_adicional = 0.1 + (inp.embalagem ?? 2) + (inp.insumos ?? 0) + (inp.frete ?? 0) + (inp.adic1 ?? 0) + (inp.adic2 ?? 0);

  // ── TOTAIS ──
  const custo_producao = custo_material + custo_energia + custo_manutencao + custo_roi + custo_falhas + custo_dep;
  const custo_total    = custo_producao + custo_hora_op + custo_adicional;

  // ── PREÇOS ──
  const ma = inp.markup_atacado || 1.5;
  const mv = inp.markup_varejo  || 2.2;
  const sug_a = custo_total * ma;
  const sug_v = custo_total * mv;
  const fin_a = inp.preco_fin_atacado || Math.ceil(sug_a);
  const fin_v = inp.preco_fin_varejo  || Math.ceil(sug_v);

  // ── LUCROS ──
  const taxa  = (inp.taxa_mkt_pct || 0) / 100;
  const tx_a  = fin_a * taxa; const tx_v = fin_v * taxa;
  const luc_a = fin_a - custo_total - tx_a;
  const luc_v = fin_v - custo_total - tx_v;
  const marg_a = fin_a > 0 ? (luc_a / fin_a * 100) : 0;
  const marg_v = fin_v > 0 ? (luc_v / fin_v * 100) : 0;

  return {
    produto:inp.produto, impressora:imp.marca, filamento:fil.tipo+' '+fil.cor+' ('+fil.marca+')',
    gramas_gastas:+peso_gr.toFixed(2), tempo_hrs:tempo, peso_gr:+peso_gr.toFixed(2),
    custo_material:+custo_material.toFixed(2),   custo_energia:+custo_energia.toFixed(2),
    custo_manutencao:+custo_manutencao.toFixed(2), custo_roi:+custo_roi.toFixed(2),
    custo_falhas:+custo_falhas.toFixed(2),       custo_dep:+custo_dep.toFixed(2),
    custo_producao:+custo_producao.toFixed(2),
    custo_hora_op:+custo_hora_op.toFixed(2),     custo_adicional:+custo_adicional.toFixed(2),
    custo_total:+custo_total.toFixed(2),
    sug_atacado:+sug_a.toFixed(2), sug_varejo:+sug_v.toFixed(2),
    fin_atacado:+fin_a.toFixed(2), fin_varejo:+fin_v.toFixed(2),
    taxa_mkt_a:+tx_a.toFixed(2),   taxa_mkt_v:+tx_v.toFixed(2),
    luc_atacado:+luc_a.toFixed(2), luc_varejo:+luc_v.toFixed(2),
    marg_atacado:+marg_a.toFixed(1), marg_varejo:+marg_v.toFixed(1),
    markup_atacado:ma, markup_varejo:mv, embalagem:inp.embalagem||2,
    data:new Date().toISOString().split('T')[0],
  };
}

  const db=S.db_precificacao;
  const totalCalc=db.length;
  const melhorMargem=db.length?Math.max(...db.map(p=>p.marg_varejo)):0;
  return `
  <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-card"><div class="stat-label">Precificações salvas</div><div class="stat-value">${totalCalc}</div></div>

    <div class="stat-card"><div class="stat-label">Melhor margem varejo</div><div class="stat-value" style="color:var(--success)">${melhorMargem.toFixed(1)}%</div></div>
  </div>
  <div class="info-box"><i class="ti ti-info-circle" aria-hidden="true"></i><span>Fórmula baseada na <strong>Calculadora FDM V2.5</strong> de Diego Amado. Inclui custo de material, energia, manutenção, falhas, depreciação e hora trabalhada.</span></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
    <div class="card" style="margin-bottom:0">
      <div class="card-header"><div class="card-title">Nova precificação</div><button class="btn btn-primary" onclick="openModal('precificacao')"><i class="ti ti-calculator" style="font-size:13px" aria-hidden="true"></i>Calcular</button></div>
      <div style="color:var(--text3);font-size:13px">Entre com os parâmetros da peça e calcule o preço sugerido com lucro para atacado e varejo.</div>

function verDetalhes(idx){
  const saved=S.db_precificacao[idx];if(!saved)return;

  // Recalcula ao vivo para corrigir qualquer NaN salvo no histórico
  const imp = S.impressoras[0]; // sempre Bambu Lab A1
  const imp_valor    = imp.valor          || 5500;
  const imp_meses    = imp.meses_retorno  || 10;
  const imp_hrs      = imp.hrs_dia        || 15;
  const imp_dias     = imp.dias_mes       || 20;
  const imp_pot      = imp.potencia_kw    || 0.5;
  const imp_tarifa   = imp.tarifa_kwh     || 0.95;
  const imp_falhas   = imp.perc_falhas    || 5;
  const imp_desgaste = imp.nivel_desgaste || 30;
  const DEPRECIACAO_CONST = imp.dep_const || 2058.333333;

  const tempo    = saved.tempo_hrs    || 1;
  const peso_gr  = saved.gramas_gastas|| saved.peso_gr || 0;
  const cm       = isNaN(saved.custo_material)  ? 0 : saved.custo_material;

  const custo_material   = cm;
  const custo_energia    = tempo * imp_pot * imp_tarifa;
  const hr_ano           = imp_hrs * imp_dias * 12;
  const custo_manutencao = (imp_valor * (imp_desgaste/100) / hr_ano) * tempo;
  const custo_roi        = (imp_valor / (imp_meses * imp_hrs * imp_dias)) * tempo;
  const custo_falhas     = custo_material * (imp_falhas / 100);
  const uso_estimado_anual = imp_meses * imp_hrs * imp_dias;
  const custo_dep        = uso_estimado_anual / DEPRECIACAO_CONST;
  const custo_hora_op    = saved.custo_hora_op || 0.50;
  const custo_adicional  = saved.custo_adicional || 2.10;
  const custo_producao   = custo_material + custo_energia + custo_manutencao + custo_roi + custo_falhas + custo_dep;
  const custo_total      = custo_producao + custo_hora_op + custo_adicional;

  const fin_a = saved.fin_atacado || 0;
  const fin_v = saved.fin_varejo  || 0;
  const luc_a = fin_a - custo_total - (saved.taxa_mkt_a||0);
  const luc_v = fin_v - custo_total - (saved.taxa_mkt_v||0);
  const marg_a = fin_a>0 ? (luc_a/fin_a*100) : 0;
  const marg_v = fin_v>0 ? (luc_v/fin_v*100) : 0;

  // Atualiza o registro salvo com valores corretos
  S.db_precificacao[idx] = Object.assign(saved, {
    custo_material:+custo_material.toFixed(2),
    custo_energia:+custo_energia.toFixed(2),
    custo_manutencao:+custo_manutencao.toFixed(2),
    custo_roi:+custo_roi.toFixed(2),
    custo_falhas:+custo_falhas.toFixed(2),
    custo_dep:+custo_dep.toFixed(2),
    custo_producao:+custo_producao.toFixed(2),
    custo_total:+custo_total.toFixed(2),
    luc_atacado:+luc_a.toFixed(2), luc_varejo:+luc_v.toFixed(2),
    marg_atacado:+marg_a.toFixed(1), marg_varejo:+marg_v.toFixed(1),
  });
  save();

  const p = S.db_precificacao[idx];
  const mr=document.getElementById('modal-root');
  const barW=(v,max)=>Math.min(100,Math.max(0,Math.round(v/(max||1)*100)));
  mr.innerHTML=`<div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" style="max-width:520px" role="dialog" aria-label="Detalhes de precificação">
      <div class="modal-title">📊 ${p.produto} <button class="modal-close" onclick="closeModalD()" aria-label="Fechar">×</button></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        <div style="background:var(--atac-bg);border-radius:var(--radius);padding:12px;text-align:center">
          <div style="font-size:11px;color:var(--atac);font-weight:600;text-transform:uppercase;margin-bottom:4px">Preço Atacado</div>
          <div style="font-size:24px;font-weight:700;color:var(--atac)">${fmt(p.fin_atacado)}</div>
          <div style="font-size:12px;color:var(--atac);margin-top:2px">Lucro: ${fmt(p.luc_atacado)} (${p.marg_atacado}%)</div>
        </div>
        <div style="background:var(--vare-bg);border-radius:var(--radius);padding:12px;text-align:center">
          <div style="font-size:11px;color:var(--vare);font-weight:600;text-transform:uppercase;margin-bottom:4px">Preço Varejo</div>
          <div style="font-size:24px;font-weight:700;color:var(--vare)">${fmt(p.fin_varejo)}</div>
          <div style="font-size:12px;color:var(--vare);margin-top:2px">Lucro: ${fmt(p.luc_varejo)} (${p.marg_varejo}%)</div>
        </div>
      </div>
      <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text2)">Composição do custo total: ${fmt(p.custo_total)}</div>
      ${[
        ['Material (filamento)',p.custo_material,'#185FA5'],
        ['Energia (impressora)',p.custo_energia,'#854F0B'],
        ['Manutenção',p.custo_manutencao,'#3C3489'],
        ['Retorno do investimento',p.custo_roi,'#0F6E56'],
        ['Falhas estimadas',p.custo_falhas,'#A32D2D'],
        ['Depreciação (fixa/sessão)',p.custo_dep,'#888780'],
        ['Hora operador',p.custo_hora_op,'#185FA5'],
        ['Embalagem + extras',p.custo_adicional,'#6B3A00'],
      ].map(([label,val,cor])=>`
        <div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px">
            <span style="color:var(--text2)">${label}</span><span style="font-weight:600">${fmt(val)}</span>
          </div>
          <div class="progress"><div class="progress-bar" style="width:${barW(val,p.custo_total)}%;background:${cor}"></div></div>
        </div>`).join('')}
      <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:10px;font-size:12px;color:var(--text3)">
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <span>🖨 ${p.impressora}</span>
          <span>🧵 ${p.filamento}</span>
          <span>⚖ ${p.gramas_gastas}g gastos · ⏱ ${p.tempo_hrs}h impressão</span>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="aplicarPrecoNoEstoque(${idx})"><i class="ti ti-tag" style="font-size:13px" aria-hidden="true"></i>Aplicar preço no estoque</button><button class="btn" onclick="closeModalD()">Fechar</button></div>
    </div></div>`;
}

function aplicarPrecoNoEstoque(idx){
  const p=S.db_precificacao[idx];if(!p)return;
  const ex=S.estoque.find(e=>e.produto.toLowerCase()===p.produto.toLowerCase());
  if(ex){ex.preco=p.fin_varejo;save();toast(`Preço do ${p.produto} atualizado para ${fmt(p.fin_varejo)} no estoque!`);closeModalD();}
  else{toast('Produto não encontrado no estoque. Produza primeiro.','warn');closeModalD();}
}

function delPrec(idx){
  if(!confirm('Remover esta precificação?'))return;
  S.db_precificacao.splice(idx,1);
  save();toast('Precificação removida.','warn');render();
}

function saveEditPrec(idx){
  const p=S.db_precificacao[idx];if(!p)return;
  const novoNome  = document.getElementById('ep2-nome')?.value.trim()||p.produto;
  const novoGr    = parseFloat(document.getElementById('ep2-gr')?.value)||p.gramas_gastas||0;
  const novoTempo = parseFloat(document.getElementById('ep2-tempo')?.value)||p.tempo_hrs||1;
  const novoMa    = parseFloat(document.getElementById('ep2-ma')?.value)||1.5;
  const novoMv    = parseFloat(document.getElementById('ep2-mv')?.value)||2.2;
  const novoFinA  = parseFloat(document.getElementById('ep2-fin-a')?.value)||0;
  const novoFinV  = parseFloat(document.getElementById('ep2-fin-v')?.value)||0;
  const novoEmb   = parseFloat(document.getElementById('ep2-emb')?.value)||2;
  const novaData  = document.getElementById('ep2-data')?.value||p.data;

  // Recalcula com novos dados
  const imp = S.impressoras[0];
  const imp_valor    = imp.valor||5500;
  const imp_meses    = imp.meses_retorno||10;
  const imp_hrs      = imp.hrs_dia||22;
  const imp_dias     = imp.dias_mes||30;
  const imp_pot      = imp.potencia_kw||0.5;
  const imp_tarifa   = imp.tarifa_kwh||0.95;
  const imp_falhas   = imp.perc_falhas||5;
  const imp_desgaste = imp.nivel_desgaste||30;
  const DEP_CONST    = imp.dep_const||2058.333333;

  const fil = S.filamentos.find(f=>f.id===p.filamento_id)||S.filamentos[0];
  const cpg = fil ? fil.preco/fil.peso_total : 0;

  const cm    = novoGr * cpg;
  const hr_ano= imp_hrs * imp_dias * 12;
  const ce    = novoTempo * imp_pot * imp_tarifa;
  const cman  = (imp_valor*(imp_desgaste/100)/hr_ano)*novoTempo;
  const croi  = (imp_valor/(imp_meses*imp_hrs*imp_dias))*novoTempo;
  const cf    = cm*(imp_falhas/100);
  const cdep  = (imp_meses*imp_hrs*imp_dias)/DEP_CONST;
  const chor  = p.custo_hora_op||0.5;
  const cadic = 0.1+novoEmb+(p.insumos||0)+(p.frete||0);
  const cprod = cm+ce+cman+croi+cf+cdep;
  const ctotal= cprod+chor+cadic;

  const fin_a = novoFinA||Math.ceil(ctotal*novoMa);
  const fin_v = novoFinV||Math.ceil(ctotal*novoMv);
  const luc_a = fin_a-ctotal-(p.taxa_mkt_a||0);
  const luc_v = fin_v-ctotal-(p.taxa_mkt_v||0);

  Object.assign(p,{
    produto:novoNome, gramas_gastas:+novoGr.toFixed(2), peso_gr:+novoGr.toFixed(2),
    tempo_hrs:novoTempo, markup_atacado:novoMa, markup_varejo:novoMv, embalagem:novoEmb, data:novaData,
    custo_material:+cm.toFixed(2), custo_energia:+ce.toFixed(2),
    custo_manutencao:+cman.toFixed(2), custo_roi:+croi.toFixed(2),
    custo_falhas:+cf.toFixed(2), custo_dep:+cdep.toFixed(2),
    custo_producao:+cprod.toFixed(2), custo_adicional:+cadic.toFixed(2),
    custo_total:+ctotal.toFixed(2),
    sug_atacado:+((ctotal*novoMa)).toFixed(2), sug_varejo:+((ctotal*novoMv)).toFixed(2),
    fin_atacado:+fin_a.toFixed(2), fin_varejo:+fin_v.toFixed(2),
    luc_atacado:+luc_a.toFixed(2), luc_varejo:+luc_v.toFixed(2),
    marg_atacado:fin_a>0?+((luc_a/fin_a*100)).toFixed(1):0,
    marg_varejo:fin_v>0?+((luc_v/fin_v*100)).toFixed(1):0,
  });
  save();closeModalD();toast('Precificação atualizada!');render();
}

      <div class="form-group"><label class="form-label">Tempo de impressão (h)</label><input class="form-control" id="pc-tempo" type="number" value="2" min="0.1" step="0.1" oninput="previewCalc()"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Horas do operador</label><input class="form-control" id="pc-hrsop" type="number" value="1" min="0" step="0.5" oninput="previewCalc()"></div>
        <div class="form-group"><label class="form-label">Custo por hora op. (R$)</label><input class="form-control" id="pc-custohora" type="number" value="0.50" min="0" step="0.25" oninput="previewCalc()"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Embalagem (R$)</label><input class="form-control" id="pc-emb" type="number" value="2" min="0" step="0.5" oninput="previewCalc()"></div>
        <div class="form-group"><label class="form-label">Tarifa kWh (R$)</label><input class="form-control" id="pc-kwh" type="number" value="0.95" min="0.1" step="0.01" oninput="previewCalc()"><div class="form-hint">Planilha Viviane = R$0,95</div></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Taxa marketplace (%)</label><input class="form-control" id="pc-taxa" type="number" value="0" min="0" max="30" step="0.5"><div class="form-hint">ML Básico≈16%, Shopee≈12%</div></div>
        <div class="form-group"><label class="form-label">Frete (R$)</label><input class="form-control" id="pc-frete" type="number" value="0" min="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Markup Atacado (x)</label><input class="form-control" id="pc-ma" type="number" value="1.5" min="1" step="0.1"><div class="form-hint">Padrão: 1.5x</div></div>
        <div class="form-group"><label class="form-label">Markup Varejo (x)</label><input class="form-control" id="pc-mv" type="number" value="2.2" min="1" step="0.1"><div class="form-hint">Padrão: 2.2x</div></div>
      </div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:4px">
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">Preços finais (sobrescreve o sugerido)</div>
        <div class="form-row">
          <div class="form-group" style="margin-bottom:0"><label class="form-label">Preço final Atacado (R$)</label><input class="form-control" id="pc-fin-a" type="number" min="0" step="0.5" placeholder="Deixe vazio = sugerido"></div>
          <div class="form-group" style="margin-bottom:0"><label class="form-label">Preço final Varejo (R$)</label><input class="form-control" id="pc-fin-v" type="number" min="0" step="0.5" placeholder="Deixe vazio = sugerido"></div>
        </div>
      </div>
      <div id="prec-preview" style="display:none;margin-top:12px;background:var(--accent-bg);border-radius:var(--radius);padding:10px;font-size:12px"></div>
      <div class="modal-footer"><button class="btn" onclick="closeModalD()">Cancelar</button><button class="btn btn-primary" onclick="salvarPrecificacao()"><i class="ti ti-device-floppy" style="font-size:13px" aria-hidden="true"></i>Calcular e salvar</button></div>
    </div></div>`;
  _precFilRowId = 0;
  setTimeout(()=>{ addPrecFilRow(); previewCalc(); }, 100);
}

function previewCalc(){
  const res=buildPrecInput();
  if(!res)return;
  const p=calcPreco(res);
  if(!p)return;
  const prev=document.getElementById('prec-preview');
  if(prev){
    prev.style.display='block';
    prev.innerHTML=`
      <div style="font-weight:600;margin-bottom:6px">📊 Preview em tempo real</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px">
        <span style="color:var(--text3)">Material:</span><span><strong>${fmt(p.custo_material)}</strong></span>
        <span style="color:var(--text3)">Energia:</span><span>${fmt(p.custo_energia)}</span>
        <span style="color:var(--text3)">Manutenção:</span><span>${fmt(p.custo_manutencao)}</span>
        <span style="color:var(--text3)">ROI:</span><span>${fmt(p.custo_roi)}</span>
        <span style="color:var(--text3)">Falhas:</span><span>${fmt(p.custo_falhas)}</span>
        <span style="color:var(--text3)">Depreciação:</span><span>${fmt(p.custo_dep)}</span>
        <span style="color:var(--text3)">Hora operador:</span><span>${fmt(p.custo_hora_op)}</span>
        <span style="color:var(--text3)">Embalagem+extras:</span><span>${fmt(p.custo_adicional)}</span>
        <span style="font-weight:700;border-top:1px solid var(--border);padding-top:4px">Custo total:</span>
        <span style="font-weight:700;border-top:1px solid var(--border);padding-top:4px">${fmt(p.custo_total)}</span>
      </div>
      <div style="margin-top:8px;display:flex;gap:16px">
        <span>🟢 Atacado sugerido: <strong style="color:var(--atac)">${fmt(p.sug_atacado)}</strong></span>
        <span>🔵 Varejo sugerido: <strong style="color:var(--vare)">${fmt(p.sug_varejo)}</strong></span>
      </div>`;
  }
}

// ── FILAMENTOS MULTICOLOR NA PRECIFICAÇÃO ──
let _precFilRowId = 0;

function addPrecFilRow(){
  const container = document.getElementById('prec-fil-rows');
  if(!container) return;
  const rid = _precFilRowId++;
  const opts = S.filamentos.map(f=>`<option value="${f.id}">${f.tipo} ${f.cor} — ${f.marca} (R$${f.preco.toFixed(2)}/kg)</option>`).join('');
  const div = document.createElement('div');
  div.id = `prf-row-${rid}`;
  div.style.cssText = 'display:grid;grid-template-columns:1fr 110px 32px;gap:6px;align-items:center;margin-bottom:6px';
  div.innerHTML = `
    <select class="form-control" id="prf-sel-${rid}" onchange="calcPrecGramas();previewCalc()">
      <option value="">Selecione...</option>${opts}
    </select>
    <div style="position:relative">
      <input class="form-control" id="prf-gr-${rid}" type="number" min="0.01" step="0.01" placeholder="gramas" oninput="calcPrecGramas();previewCalc()" style="padding-right:22px">
      <span style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3)">g</span>
    </div>
    <button class="delete-btn" onclick="removePrecFilRow(${rid})" style="height:34px;width:32px;padding:0;display:flex;align-items:center;justify-content:center"><i class="ti ti-trash" style="font-size:13px"></i></button>`;
  container.appendChild(div);
}

function removePrecFilRow(rid){
  const el = document.getElementById(`prf-row-${rid}`);
  if(el) el.remove();
  calcPrecGramas(); previewCalc();
}

function calcPrecGramas(){
  let total = 0;
  document.querySelectorAll('[id^="prf-gr-"]').forEach(inp=>{ total += parseFloat(inp.value)||0; });
  const el = document.getElementById('prec-total-gr');
  if(el) el.textContent = total.toFixed(2)+'g';
}

function getPrecFilRows(){
  const rows = [];
  document.querySelectorAll('[id^="prf-sel-"]').forEach(sel=>{
    const rid = sel.id.replace('prf-sel-','');
    const fid = parseInt(sel.value);
    const gr = parseFloat(document.getElementById(`prf-gr-${rid}`)?.value)||0;
    if(fid && gr>0) rows.push({filamento_id:fid, gramas:gr});
  });
  return rows;
}

function buildPrecInput(){
  const v = id => document.getElementById(id)?.value;
  // Coleta filamentos multicolor da precificação
  const filRows = getPrecFilRows();
  // Custo material = soma de (gramas × custo/g) de cada filamento
  let totalGramas = 0;
  let custoMaterialTotal = 0;
  let filamento_id_principal = S.filamentos[0]?.id;
  filRows.forEach(r => {
    const f = S.filamentos.find(x=>x.id===r.filamento_id);
    if(f){
      totalGramas += r.gramas;
      custoMaterialTotal += r.gramas * (f.preco / f.peso_total);
      filamento_id_principal = r.filamento_id; // último (ou único)
    }
  });
  return {
    produto:          v('pc-nome')?.trim() || 'Produto',
    impressora_id:    parseInt(v('pc-imp'))   || S.impressoras[0]?.id,
    filamento_id:     filamento_id_principal,
    gramas_gastas:    totalGramas || 0,
    custo_material_override: custoMaterialTotal > 0 ? custoMaterialTotal : null,
    filamentos_prec:  filRows,
    tempo_hrs:        parseFloat(v('pc-tempo'))    ?? 2,
    hrs_trabalhadas:  parseFloat(v('pc-hrsop'))    ?? 1,
    custo_hora:       parseFloat(v('pc-custohora'))?? 0.5,
    tarifa_kwh:       parseFloat(v('pc-kwh'))      ?? 0.95,
    embalagem:        parseFloat(v('pc-emb'))      ?? 2,
    frete:            parseFloat(v('pc-frete'))    ?? 0,
    taxa_mkt_pct:     parseFloat(v('pc-taxa'))     ?? 0,
    markup_atacado:   parseFloat(v('pc-ma'))       ?? 1.5,
    markup_varejo:    parseFloat(v('pc-mv'))       ?? 2.2,
    preco_fin_atacado:parseFloat(v('pc-fin-a'))    || 0,
    preco_fin_varejo: parseFloat(v('pc-fin-v'))    || 0,
  };
}

function salvarPrecificacao(){
  const inp=buildPrecInput();
  if(!inp.produto||inp.produto==='Produto'){toast('Informe o nome do produto!','err');return;}
  if(S.filamentos.length===0){toast('Cadastre ao menos um filamento antes de precificar!','err');return;}
  const res=calcPreco(inp);
  if(!res){toast('Erro no cálculo. Verifique os dados.','err');return;}
  res.id=S.nextPrecId++;
  S.db_precificacao.push(res);
  save();closeModalD();toast(`Preço calculado! Atacado: ${fmt(res.fin_atacado)} | Varejo: ${fmt(res.fin_varejo)}`);
  goTo('precificacao');
}

// ── SANITIZA todos os registros salvos ao iniciar ──
// Corrige NaN de versões anteriores onde meses_retorno estava undefined
(function sanitizarPrecificacoes(){
  if(!S.db_precificacao||!S.db_precificacao.length) return;
  const imp = S.impressoras[0];
  if(!imp) return;
  const imp_valor    = imp.valor          || 5500;
  const imp_meses    = imp.meses_retorno  || 10;
  const imp_hrs      = imp.hrs_dia        || 15;
  const imp_dias     = imp.dias_mes       || 20;
  const imp_pot      = imp.potencia_kw    || 0.5;
  const imp_tarifa   = imp.tarifa_kwh     || 0.95;
  const imp_falhas   = imp.perc_falhas    || 5;
  const imp_desgaste = imp.nivel_desgaste || 30;
  const DEPRECIACAO_CONST = imp.dep_const || 2058.333333;
  let dirty = false;
  S.db_precificacao.forEach(function(p,idx){
    if(true){ // recalcula sempre para garantir fórmula correta
      const tempo = p.tempo_hrs || 1;
      const cm    = isNaN(p.custo_material) ? 0 : (p.custo_material||0);
      const custo_energia    = tempo * imp_pot * imp_tarifa;
      const hr_ano           = imp_hrs * imp_dias * 12;
      const custo_manutencao = (imp_valor * (imp_desgaste/100) / hr_ano) * tempo;
      const custo_roi        = (imp_valor / (imp_meses * imp_hrs * imp_dias)) * tempo;
      const custo_falhas     = cm * (imp_falhas / 100);
      const uso_estimado_anual = imp_meses * imp_hrs * imp_dias;
      const custo_dep        = uso_estimado_anual / DEPRECIACAO_CONST;
      const custo_hora_op    = p.custo_hora_op   || 0.50;
      const custo_adicional  = p.custo_adicional || 2.10;
      const custo_producao   = cm + custo_energia + custo_manutencao + custo_roi + custo_falhas + custo_dep;
      const custo_total      = custo_producao + custo_hora_op + custo_adicional;
      const fin_a = p.fin_atacado || 0;
      const fin_v = p.fin_varejo  || 0;
      const luc_a = fin_a - custo_total;
      const luc_v = fin_v - custo_total;
      S.db_precificacao[idx] = Object.assign(p, {
        custo_energia:    +custo_energia.toFixed(2),
        custo_manutencao: +custo_manutencao.toFixed(2),
        custo_roi:        +custo_roi.toFixed(2),
        custo_falhas:     +custo_falhas.toFixed(2),
        custo_dep:        +custo_dep.toFixed(2),
        custo_producao:   +custo_producao.toFixed(2),
        custo_total:      +custo_total.toFixed(2),
        luc_atacado:      +luc_a.toFixed(2),
        luc_varejo:       +luc_v.toFixed(2),
        marg_atacado:     fin_a>0 ? +((luc_a/fin_a*100)).toFixed(1) : 0,
        marg_varejo:      fin_v>0 ? +((luc_v/fin_v*100)).toFixed(1) : 0,
      });
      dirty = true;
    }
  });
  if(dirty) save();
})();

document.getElementById('mob-date').textContent=todayLong();
render();
