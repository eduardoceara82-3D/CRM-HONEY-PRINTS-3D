<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Print3D CRM">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
<title>Print3D CRM</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23185FA5'/><text y='68' x='50' text-anchor='middle' font-size='52' fill='white'>🖨</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23185FA5'/><text y='68' x='50' text-anchor='middle' font-size='52' fill='white'>🖨</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --accent:#185FA5;--accent-bg:#E6F1FB;--accent-text:#0C447C;
  --success:#0F6E56;--success-bg:#E1F5EE;--danger:#A32D2D;--danger-bg:#FCEBEB;
  --warning:#854F0B;--warning-bg:#FAEEDA;--pro:#3C3489;--pro-bg:#EEEDFE;
  --atac:#0F6E56;--atac-bg:#E1F5EE;--vare:#185FA5;--vare-bg:#E6F1FB;
  --wpp:#1a6c3a;--wpp-bg:#d4edda;--vd:#6B3A00;--vd-bg:#FFF0D6;
  --bg:#F5F5F3;--surface:#FFFFFF;--surface2:#F9F9F7;
  --text:#1A1A18;--text2:#5F5E5A;--text3:#888780;
  --border:#E0DED8;--border2:#C8C6C0;
  --radius:8px;--radius-lg:14px;
  --sidebar:240px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#141413;--surface:#1E1E1C;--surface2:#252523;
    --text:#F0EEE8;--text2:#B4B2A9;--text3:#888780;
    --border:#2C2C2A;--border2:#3C3C3A;
    --accent-bg:#0C2A45;--accent-text:#85B7EB;
    --success-bg:#04201A;--danger-bg:#250D0D;--warning-bg:#1A1008;--pro-bg:#13103A;
    --atac-bg:#04201A;--vare-bg:#0C2A45;
    --wpp-bg:#0a2e15;--vd-bg:#2a1800;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;color:var(--text);background:var(--bg)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:20}
.sidebar-brand{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.brand-logo{display:flex;align-items:center;gap:10px}
.brand-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-.3px}
.brand-tagline{font-size:11px;color:var(--text3);margin-top:1px}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:8px 10px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13.5px;transition:background .15s,color .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.nav-item i{font-size:18px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent-text);flex-shrink:0}
.user-name{font-size:13px;font-weight:500}
.user-role{font-size:11px;color:var(--text3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:16px;font-weight:600}
.page-sub{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:inherit;transition:background .15s}
.gdrive-btn{position:relative}
.gdrive-btn.gdrive-off{color:var(--text2)}
.gdrive-btn.gdrive-synced{color:var(--success);border-color:var(--success)}
.gdrive-btn.gdrive-syncing,.gdrive-btn.gdrive-connecting{color:var(--accent);border-color:var(--accent)}
.gdrive-btn.gdrive-error{color:var(--danger);border-color:var(--danger)}
.gdrive-btn .ti-loader-2,.gdrive-btn .ti-cloud-up{animation:gdrive-spin 1s linear infinite}
@keyframes gdrive-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.gdrive-mob{font-size:16px;cursor:pointer}
.gdrive-mob.gdrive-off{color:var(--text3)}
.gdrive-mob.gdrive-synced{color:var(--success)}
.gdrive-mob.gdrive-syncing,.gdrive-mob.gdrive-connecting{color:var(--accent);animation:gdrive-spin 1s linear infinite}
.gdrive-mob.gdrive-error{color:var(--danger)}
@media(max-width:768px){.gdrive-label{display:none}}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#0C4A8A}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:transparent}
.content{flex:1;overflow-y:auto;padding:24px}
.mobile-topbar{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
.mobile-nav{display:none;background:var(--surface);border-top:1px solid var(--border);padding:6px 4px 10px;flex-shrink:0}
.mobile-nav-inner{display:flex;justify-content:space-around}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:6px 4px;color:var(--text3);font-size:10px;font-family:inherit;min-width:52px;border-radius:var(--radius)}
.mob-btn.active{color:var(--accent)}
.mob-btn i{font-size:22px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
.stat-icon{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.stat-label{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:4px}
.stat-value{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-change{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:3px}
.up{color:var(--success)}.down{color:var(--danger)}.neutral{color:var(--text3)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;color:var(--text3);font-weight:500;font-size:11px;border-bottom:1px solid var(--border);background:var(--surface2);text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap}
.b-ml{background:var(--warning-bg);color:var(--warning)}
.b-sh{background:var(--danger-bg);color:var(--danger)}
.b-ig{background:var(--pro-bg);color:var(--pro)}
.b-ok{background:var(--success-bg);color:var(--success)}
.b-low{background:var(--danger-bg);color:var(--danger)}
.b-mid{background:var(--warning-bg);color:var(--warning)}
.b-pla{background:var(--success-bg);color:var(--success)}
.b-petg{background:var(--accent-bg);color:var(--accent-text)}
.b-tpu{background:var(--pro-bg);color:var(--pro)}
.b-abs{background:var(--warning-bg);color:var(--warning)}
.b-atac{background:var(--atac-bg);color:var(--atac);font-weight:600}
.b-vare{background:var(--vare-bg);color:var(--vare);font-weight:600}
.b-wpp{background:var(--wpp-bg);color:var(--wpp);font-weight:500}
.b-vd{background:var(--vd-bg);color:var(--vd);font-weight:500}
.progress{background:var(--bg);border-radius:4px;height:6px;overflow:hidden}
.progress-bar{height:6px;border-radius:4px;transition:width .4s}
.pr-ok{background:#1D9E75}.pr-mid{background:#EF9F27}.pr-low{background:#E24B4A}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-12{display:grid;grid-template-columns:1fr 2fr;gap:14px}
.channel-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.channel-row:last-child{border:none}
.channel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.channel-name{flex:1;font-size:13px}
.channel-bar-wrap{flex:2;background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
.channel-bar{height:8px;border-radius:4px}
.channel-val{font-size:13px;font-weight:500;min-width:70px;text-align:right}
.mini-chart{display:flex;align-items:flex-end;gap:5px;height:56px;padding:0 2px}
.bar-col{flex:1;border-radius:3px 3px 0 0;min-width:16px;background:var(--accent-bg)}
.bar-col.current{background:var(--accent)}
.chart-labels{display:flex;padding:0 2px}
.chart-label{flex:1;text-align:center;font-size:10px;color:var(--text3);margin-top:4px}
.fil-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start}
.fil-icon{width:44px;height:44px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fil-info{flex:1;min-width:0}
.fil-title{font-size:13px;font-weight:600;margin-bottom:2px}
.fil-meta{font-size:11px;color:var(--text3);margin-bottom:6px}
.fil-alert{background:var(--danger-bg);color:var(--danger);padding:5px 9px;border-radius:var(--radius);font-size:11px;font-weight:500;margin-top:7px;display:flex;align-items:center;gap:5px}
.info-box{background:var(--accent-bg);border:1px solid var(--accent);border-radius:var(--radius);padding:9px 13px;font-size:12px;color:var(--accent-text);margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.info-box i{font-size:15px;flex-shrink:0;margin-top:1px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:22px;line-height:1;padding:2px;border-radius:6px}
.modal-close:hover{background:var(--bg);color:var(--text)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:border .15s}
.form-control:focus{border-color:var(--accent)}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal-warn{background:var(--warning-bg);border:1px solid;border-color:var(--warning);border-radius:var(--radius);padding:9px 13px;font-size:12px;color:var(--warning);margin-top:12px;display:flex;align-items:flex-start;gap:7px}
.modal-warn i{font-size:14px;flex-shrink:0;margin-top:1px}
.fil-select-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;font-size:13px;transition:background .1s}
.fil-select-row:hover{background:var(--bg)}
.fil-select-row.selected{border-color:var(--accent);background:var(--accent-bg)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;padding:11px 22px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:2000;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.fab{display:none;position:fixed;bottom:76px;right:18px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:24px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.25);z-index:50}
.fab:hover{background:#0C4A8A}
.install-banner{background:var(--accent-bg);border:1px solid var(--accent);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.install-banner i{font-size:20px;color:var(--accent-text);flex-shrink:0}
.install-text{flex:1;font-size:13px;color:var(--accent-text)}
.install-text strong{display:block;font-size:13px;margin-bottom:1px}
.install-text span{font-size:11px;opacity:.8}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:10px;opacity:.4}
.empty p{font-size:14px;margin-bottom:4px;color:var(--text2)}
.empty span{font-size:12px}
.tipo-toggle{display:flex;gap:0;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.tipo-btn{flex:1;padding:9px 8px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);font-family:inherit;transition:background .15s,color .15s}
.tipo-btn.active-atac{background:var(--atac-bg);color:var(--atac)}
.tipo-btn.active-vare{background:var(--vare-bg);color:var(--vare)}
@media(max-width:768px){
  .sidebar{display:none}
  .topbar{display:none}
  .mobile-topbar{display:flex}
  .mobile-nav{display:block}
  .fab{display:flex}
  .content{padding:12px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .grid-2,.grid-3,.grid-12{grid-template-columns:1fr}
  .stat-value{font-size:20px}
  .modal{margin:0;border-radius:var(--radius-lg) var(--radius-lg) 0 0;position:fixed;bottom:0;left:0;right:0;max-width:100%;max-height:92vh}
  .modal-overlay{align-items:flex-end;padding:0}
  .form-row,.form-row-3{grid-template-columns:1fr}
}
@media(min-width:769px) and (max-width:1100px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:repeat(2,1fr)}
}
.delete-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:6px;transition:color .15s}
.delete-btn:hover{color:var(--danger)}
.edit-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:6px;transition:color .15s}
.edit-btn:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon"><i class="ti ti-printer" aria-hidden="true"></i></div>
        <div><div class="brand-name">Print3D CRM</div><div class="brand-tagline">Gestão de impressão</div></div>
      </div>
    </div>
    <nav class="sidebar-nav" aria-label="Menu principal">
      <div class="nav-section">Principal</div>
      <button class="nav-item active" onclick="goTo('dashboard')" id="snav-dashboard"><i class="ti ti-layout-dashboard" aria-hidden="true"></i>Painel geral</button>
      <div class="nav-section">Operação</div>
      <button class="nav-item" onclick="goTo('producao')" id="snav-producao"><i class="ti ti-printer" aria-hidden="true"></i>Produção</button>
      <button class="nav-item" onclick="goTo('vendas')" id="snav-vendas"><i class="ti ti-shopping-cart" aria-hidden="true"></i>Vendas</button>
      <button class="nav-item" onclick="goTo('saidas')" id="snav-saidas"><i class="ti ti-cash-off" aria-hidden="true"></i>Saídas / Despesas</button>
      <button class="nav-item" onclick="goTo('patrimonio')" id="snav-patrimonio"><i class="ti ti-building-store" aria-hidden="true"></i>Patrimônio</button>
      <button class="nav-item" onclick="goTo('perdas')" id="snav-perdas"><i class="ti ti-alert-triangle" aria-hidden="true"></i>Perdas</button>
      <button class="nav-item" onclick="goTo('estoque')" id="snav-estoque"><i class="ti ti-package" aria-hidden="true"></i>Estoque</button>
      <button class="nav-item" onclick="goTo('materiais')" id="snav-materiais"><i class="ti ti-cylinder" aria-hidden="true"></i>Materiais</button>
      <div class="nav-section">Análises</div>
      <button class="nav-item" onclick="goTo('relatorios')" id="snav-relatorios"><i class="ti ti-chart-bar" aria-hidden="true"></i>Relatórios</button>
      <button class="nav-item" onclick="goTo('precificacao')" id="snav-precificacao"><i class="ti ti-calculator" aria-hidden="true"></i>Precificação</button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">ED</div>
        <div><div class="user-name">Eduardo</div><div class="user-role">Administrador</div></div>
      </div>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div><div class="page-title" id="page-title">Painel geral</div><div class="page-sub" id="page-sub">Visão consolidada do negócio</div></div>
      <div class="topbar-actions">
        <button class="btn gdrive-btn gdrive-off" id="gdrive-status" onclick="gdriveButtonClick()" title="Sincronização com Google Drive"><i class="ti ti-cloud-off" style="font-size:14px" aria-hidden="true"></i><span class="gdrive-label">Conectar Google Drive</span></button>
        <button class="btn" onclick="exportData()"><i class="ti ti-download" style="font-size:14px" aria-hidden="true"></i>Exportar</button>
        <button class="btn btn-primary" onclick="openFab()" id="desk-add-btn"><i class="ti ti-plus" style="font-size:14px" aria-hidden="true"></i><span id="desk-add-label">Novo lançamento</span></button>
      </div>
    </header>
    <header class="mobile-topbar">
      <div><div style="font-size:15px;font-weight:600" id="mob-title">Painel</div><div style="font-size:11px;color:var(--text3)" id="mob-date"></div></div>
      <div style="display:flex;align-items:center;gap:14px">
        <i class="ti ti-cloud-off gdrive-mob gdrive-off" id="gdrive-status-mobile" onclick="gdriveButtonClick()" title="Sincronização com Google Drive" aria-hidden="true"></i>
        <button class="btn" style="padding:6px 10px" onclick="exportData()"><i class="ti ti-download" style="font-size:13px" aria-hidden="true"></i></button>
        <div class="avatar">ED</div>
      </div>
    </header>
    <main class="content" id="main-content"></main>
    <nav class="mobile-nav">
      <div class="mobile-nav-inner">
        <button class="mob-btn active" onclick="goTo('dashboard')" id="mnav-dashboard"><i class="ti ti-layout-dashboard" aria-hidden="true"></i>Painel</button>
        <button class="mob-btn" onclick="goTo('producao')" id="mnav-producao"><i class="ti ti-printer" aria-hidden="true"></i>Produção</button>
        <button class="mob-btn" onclick="goTo('vendas')" id="mnav-vendas"><i class="ti ti-shopping-cart" aria-hidden="true"></i>Vendas</button>
        <button class="mob-btn" onclick="goTo('estoque')" id="mnav-estoque"><i class="ti ti-package" aria-hidden="true"></i>Estoque</button>

const GDRIVE_CLIENT_ID='667059652451-lpo17irba19url3uf4ulnlh8kb5okqkj.apps.googleusercontent.com';
const GDRIVE_SCOPE='https://www.googleapis.com/auth/drive.appdata';
const GDRIVE_FILENAME='crm_data.json';
let gdriveTokenClient=null, gdriveAccessToken=null, gdriveTokenExpiry=0, gdriveFileId=null, gdriveSignedIn=false, gdrivePushTimer=null, gdriveBusy=false;

function gdriveLoadMeta(){ try{ return JSON.parse(localStorage.getItem('p3d_v2_meta')||'{}'); }catch(e){ return {}; } }
function gdriveSaveMeta(meta){ try{ localStorage.setItem('p3d_v2_meta', JSON.stringify(meta)); }catch(e){} }

function gdriveSetStatus(status, msg){
  const icons={off:'ti-cloud-off',connecting:'ti-loader-2',synced:'ti-cloud-check',syncing:'ti-cloud-up',error:'ti-cloud-x'};
  const labels={off:'Conectar Google Drive',connecting:'Conectando...',synced:'Sincronizado',syncing:'Sincronizando...',error:'Erro de sync'};
  const icon=icons[status]||icons.off, label=msg||labels[status]||'';
  const el=document.getElementById('gdrive-status');
  if(el){ el.innerHTML=`<i class="ti ${icon}" style="font-size:14px" aria-hidden="true"></i><span class="gdrive-label">${label}</span>`; el.className='btn gdrive-btn gdrive-'+status; el.title=label; }
  const elm=document.getElementById('gdrive-status-mobile');
  if(elm){ elm.className='ti '+icon+' gdrive-mob gdrive-'+status; elm.title=label; }
}

function gdriveInit(){
  if(!window.google || !google.accounts){ setTimeout(gdriveInit,300); return; }
  gdriveTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GDRIVE_CLIENT_ID,
    scope:GDRIVE_SCOPE,
    callback:async(resp)=>{
      if(resp.error){ gdriveSetStatus('error','Login cancelado ou falhou'); return; }
      gdriveAccessToken=resp.access_token;
      gdriveTokenExpiry=Date.now()+(resp.expires_in*1000-60000);
      gdriveSignedIn=true;
      localStorage.setItem('p3d_v2_gdrive_on','1');
      gdriveSetStatus('connecting','Verificando nuvem...');
      await gdriveSyncOnConnect();
    }
  });
  if(localStorage.getItem('p3d_v2_gdrive_on')==='1'){
    gdriveSetStatus('connecting','Conectando...');
    gdriveTokenClient.requestAccessToken({prompt:''});
  } else {
    gdriveSetStatus('off');
  }
}

function gdriveButtonClick(){
  if(gdriveSignedIn){
    if(confirm('Desconectar a sincronização com o Google Drive neste dispositivo?')) gdriveDisconnect();
    return;
  }
  if(!gdriveTokenClient){ toast('Carregando Google, aguarde um instante...','warn'); return; }
  gdriveTokenClient.requestAccessToken({prompt:'consent'});
}

function gdriveDisconnect(){
  gdriveSignedIn=false; gdriveAccessToken=null; gdriveFileId=null;
  localStorage.removeItem('p3d_v2_gdrive_on');
  gdriveSetStatus('off');
  toast('Google Drive desconectado neste dispositivo.','warn');
}

function gdriveEnsureToken(){
  if(gdriveAccessToken && Date.now()<gdriveTokenExpiry) return Promise.resolve(true);
  if(!gdriveTokenClient) return Promise.resolve(false);
  return new Promise((resolve)=>{
    const prevCb=gdriveTokenClient.callback;
    gdriveTokenClient.callback=(resp)=>{
      gdriveTokenClient.callback=prevCb;
      if(resp.error){ resolve(false); return; }
      gdriveAccessToken=resp.access_token;
      gdriveTokenExpiry=Date.now()+(resp.expires_in*1000-60000);
      gdriveSignedIn=true;
      resolve(true);
    };
    gdriveTokenClient.requestAccessToken({prompt:''});
  });
}

async function gdriveFindFile(){
  const res=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27${GDRIVE_FILENAME}%27&fields=files(id,modifiedTime)`,{headers:{Authorization:'Bearer '+gdriveAccessToken}});
  if(!res.ok) throw new Error('Falha ao buscar arquivo no Drive');
  const data=await res.json();
  return (data.files && data.files[0]) || null;
}

async function gdriveDownload(fileId){
  const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+gdriveAccessToken}});
  if(!res.ok) throw new Error('Falha ao baixar dados do Drive');
  return await res.json();
}

async function gdriveUpload(fileId, payload){
  const body=JSON.stringify(payload);
  if(fileId){
    const res=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:'Bearer '+gdriveAccessToken,'Content-Type':'application/json'},body});
    if(!res.ok) throw new Error('Falha ao enviar dados ao Drive');
    return await res.json();
  }
  const metadata={name:GDRIVE_FILENAME,parents:['appDataFolder']};
  const boundary='p3dcrmboundary';
  const multipartBody=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`+
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
  const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+gdriveAccessToken,'Content-Type':`multipart/related; boundary=${boundary}`},body:multipartBody});
  if(!res.ok) throw new Error('Falha ao criar arquivo no Drive');
  return await res.json();
}

async function gdriveSyncOnConnect(){
  if(gdriveBusy) return; gdriveBusy=true;
  try{
    const ok=await gdriveEnsureToken();
    if(!ok){ gdriveSetStatus('error','Não autorizado'); gdriveBusy=false; return; }
    const file=await gdriveFindFile();
    const meta=gdriveLoadMeta();
    if(file){
      gdriveFileId=file.id;
      const cloudTime=new Date(file.modifiedTime).getTime();
      const localTime=meta.updatedAt?new Date(meta.updatedAt).getTime():0;
      if(cloudTime>localTime){
        const cloudData=await gdriveDownload(file.id);
        Object.assign(S, cloudData);
        localStorage.setItem('p3d_v2', JSON.stringify(S));
        gdriveSaveMeta({updatedAt:file.modifiedTime});
        render();
        toast('Dados sincronizados da nuvem ☁️');
      } else if(localTime>cloudTime){
        await gdrivePush(true);
      }
    } else {
      await gdrivePush(true);
    }
    gdriveSetStatus('synced');
  }catch(e){
    console.warn('Erro de sincronização inicial:', e);
    gdriveSetStatus('error','Erro ao sincronizar');
  }
  gdriveBusy=false;
}

function gdriveQueuePush(){
  if(!gdriveSignedIn) return;
  clearTimeout(gdrivePushTimer);
  gdriveSetStatus('syncing');
  gdrivePushTimer=setTimeout(()=>gdrivePush(false), 2500);
}

async function gdrivePush(silent){
  if(!gdriveSignedIn) return;
  try{
    const ok=await gdriveEnsureToken();
    if(!ok){ gdriveSetStatus('error','Sessão expirada'); return; }
    if(!gdriveFileId){
      const file=await gdriveFindFile();
      if(file) gdriveFileId=file.id;
    }
    const result=await gdriveUpload(gdriveFileId, S);
    gdriveFileId=result.id||gdriveFileId;
    gdriveSaveMeta({updatedAt:new Date().toISOString()});
    gdriveSetStatus('synced');
  }catch(e){
    console.warn('Erro ao enviar para nuvem:', e);
    gdriveSetStatus('error','Erro ao enviar');
  }
}

async function gdriveCheckRemote(){
  if(!gdriveSignedIn || gdriveBusy) return;
  try{
    const ok=await gdriveEnsureToken();
    if(!ok) return;
    if(!gdriveFileId){
      const file=await gdriveFindFile();
      if(!file) return;
      gdriveFileId=file.id;
    }
    const res=await fetch(`https://www.googleapis.com/drive/v3/files/${gdriveFileId}?fields=modifiedTime`,{headers:{Authorization:'Bearer '+gdriveAccessToken}});
    if(!res.ok) return;
    const meta2=await res.json();
    const cloudTime=new Date(meta2.modifiedTime).getTime();
    const localMeta=gdriveLoadMeta();
    const localTime=localMeta.updatedAt?new Date(localMeta.updatedAt).getTime():0;
    if(cloudTime>localTime+2000){
      const cloudData=await gdriveDownload(gdriveFileId);
      Object.assign(S, cloudData);
      localStorage.setItem('p3d_v2', JSON.stringify(S));
      gdriveSaveMeta({updatedAt:meta2.modifiedTime});
      render();
      toast('Dados atualizados de outro dispositivo ☁️');
    }
  }catch(e){ /* silencioso — não interrompe o uso normal */ }
}

document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') gdriveCheckRemote(); });
setInterval(gdriveCheckRemote, 90000);

function sortArr(arr, col, dir){
  return [...arr].sort((a,b)=>{
    let va=a[col]??'', vb=b[col]??'';
    if(typeof va==='number'||!isNaN(+va)){va=+va;vb=+vb;}
    else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
    return va<vb?-dir:va>vb?dir:0;
  });
}
function sortTh(key, stateKey, col){
  const s=S[stateKey];
  if(s.col===col){s.dir*=-1;}else{s.col=col;s.dir=1;}

}
function thSort(stateKey, col, label){
  const s=S[stateKey]||{col:'',dir:1};
  const active=s.col===col;

  return `<th style="cursor:pointer;user-select:none;white-space:nowrap" onclick="sortTh('${stateKey}','${stateKey}','${col}')">${label} <span style="color:var(--accent-text);font-size:10px">${arrow}</span></th>`;
}

  estoque:{title:'Estoque',sub:'Alimentado automaticamente pela produção',add:null},
  materiais:{title:'Materiais',sub:'Filamentos — descontados a cada lançamento de produção',add:'Novo filamento'},
  relatorios:{title:'Relatórios',sub:'Análises e exportações',add:null},
  precificacao:{title:'Precificação',sub:'Calcule o preço ideal baseado nos seus custos reais',add:'Nova precificação'},
};
function goTo(p){
  S.page=p;const pg=PAGES[p];
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('snav-'+p)?.classList.add('active');
  document.querySelectorAll('.mob-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mnav-'+p)?.classList.add('active');
  document.getElementById('page-title').textContent=pg.title;
  document.getElementById('page-sub').textContent=pg.sub;
  document.getElementById('mob-title').textContent=pg.title;
  const dab=document.getElementById('desk-add-btn');
  if(pg.add){dab.style.display='';document.getElementById('desk-add-label').textContent=pg.add;}
  else dab.style.display='none';
  render();
}

  const c=document.getElementById('main-content');
  if(S.page==='dashboard') c.innerHTML=renderDashboard();

  else if(S.page==='perdas')      c.innerHTML=renderPerdas();
  else if(S.page==='estoque') c.innerHTML=renderEstoque();
  else if(S.page==='materiais') c.innerHTML=renderMateriais();

}

      <div class="stat-change neutral">${saidas.length} lançamentos</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">✅ Pagas</div>
      <div class="stat-value" style="color:var(--danger)">${fmtK(totalPagas)}</div>
      <div class="stat-change neutral">${saidas.filter(s=>s.pago).length} baixas dadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⏳ Pendentes</div>
      <div class="stat-value" style="color:var(--warning)">${fmtK(totalPendente)}</div>
      <div class="stat-change neutral">${saidas.filter(s=>!s.pago).length} a pagar</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Saldo líquido real</div>
      <div class="stat-value" style="color:${saldo>=0?'var(--success)':'var(--danger)'}">${fmtK(saldo)}</div>
      <div class="stat-change neutral">Vendas − saídas pagas</div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-title">Saídas e despesas</div>
      <button class="btn btn-primary" onclick="openModal('saida')"><i class="ti ti-plus" style="font-size:13px"></i>Nova saída</button>
    </div>
    <div class="tab-row" style="margin-bottom:14px">
      <button class="tab ${filtro==='Todas'?'active':''}"     onclick="renderSaidasFiltro('Todas')">Todas (${saidas.length})</button>
      <button class="tab ${filtro==='Pendentes'?'active':''}" onclick="renderSaidasFiltro('Pendentes')" style="color:var(--warning)">⏳ Pendentes (${saidas.filter(s=>!s.pago).length})</button>
      <button class="tab ${filtro==='Pagas'?'active':''}"     onclick="renderSaidasFiltro('Pagas')" style="color:var(--success)">✅ Pagas (${saidas.filter(s=>s.pago).length})</button>
    </div>
    ${lista.length===0
      ?`<div class="empty"><i class="ti ti-cash-off" aria-hidden="true"></i><p>Nenhuma saída ${filtro!=='Todas'?'nesta categoria':''}</p></div>`
      :`<div class="table-wrap"><table>
      <thead><tr><th>Descrição</th><th>Categoria</th><th>Fornecedor</th><th>Pagamento</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>Data pgto</th><th>Obs.</th><th></th></tr></thead>
      <tbody>${lista.slice().reverse().map(s=>{
        const hoje = todayISO();
        const vencido = !s.pago && s.venc && s.venc < hoje;
        const venceHoje = !s.pago && s.venc && s.venc === hoje;
        return `<tr style="${s.pago?'opacity:0.75':''}">
        <td style="font-weight:500">${s.desc}</td>
        <td><span class="badge" style="background:${(catCores[s.cat]||'#888')}22;color:${catCores[s.cat]||'#888'};border:1px solid ${catCores[s.cat]||'#888'}44;font-size:10px;padding:2px 6px">${s.cat}</span></td>
        <td style="color:var(--text2)">${s.forn||'—'}</td>
        <td>${pgtoBadge(s.pgto||'—')}</td>
        <td style="color:var(--danger);font-weight:600">-${fmt(s.valor)}</td>
        <td style="font-size:12px;font-weight:${vencido||venceHoje?'700':'400'};color:${vencido?'var(--danger)':venceHoje?'var(--warning)':'var(--text3)'}">
          ${s.venc ? `${vencido?'🔴 ':venceHoje?'🟡 ':''}${dtFmt(s.venc)}${vencido?' (vencido)':venceHoje?' (hoje)':''}` : '—'}
        </td>
        <td>
          ${s.pago
            ?`<span style="font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:#1D9E7522;color:#1D9E75;border:1px solid #1D9E7544">✅ Paga</span>`
            :`<button onclick="darBaixa(${s.id})" style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:#EF9F2722;color:#EF9F27;border:1px solid #EF9F2766;cursor:pointer">⏳ Dar baixa</button>`
          }
        </td>
        <td style="color:var(--text3);font-size:12px">${s.pago&&s.data_pgto?dtFmt(s.data_pgto):'—'}</td>
        <td style="color:var(--text3);font-size:12px">${s.obs||'—'}</td>
        <td>
          <button class="edit-btn" onclick="editSaida(${s.id})" title="Editar"><i class="ti ti-edit" aria-hidden="true"></i></button>
          <button class="delete-btn" onclick="del('saidas',${s.id})" title="Remover"><i class="ti ti-trash" aria-hidden="true"></i></button>
        </td>
      </tr>`}).join('')}
      </tbody></table></div>`}
  </div>`;
}

function renderSaidasFiltro(filtro){
  document.getElementById('main-content').innerHTML=renderSaidas(filtro);
}

function darBaixa(id){
  const s=S.saidas.find(x=>x.id===id);if(!s)return;
  // Pede confirmação com data de pagamento
  const mr=document.getElementById('modal-root');
  mr.innerHTML=`<div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" style="max-width:380px" role="dialog">
      <div class="modal-title">✅ Dar baixa: ${s.desc} <button class="modal-close" onclick="closeModalD()">×</button></div>
      <div style="color:var(--text2);margin-bottom:14px">Valor: <strong style="color:var(--danger)">-${fmt(s.valor)}</strong></div>
      <div class="form-group">
        <label class="form-label">Data do pagamento</label>
        <input class="form-control" id="baixa-data" type="date" value="${todayISO()}">
      </div>
      <div class="form-group">
        <label class="form-label">Observação <span style="color:var(--text3);font-size:11px">(opcional)</span></label>
        <input class="form-control" id="baixa-obs" placeholder="Ex: Pago via PIX, comprovante #123">
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModalD()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarBaixa(${id})"><i class="ti ti-check" style="font-size:13px"></i>Confirmar pagamento</button>
      </div>
    </div></div>`;
}

function confirmarBaixa(id){
  const s=S.saidas.find(x=>x.id===id);if(!s)return;
  s.pago     = true;
  s.data_pgto= document.getElementById('baixa-data')?.value||todayISO();
  const obs  = document.getElementById('baixa-obs')?.value.trim();
  if(obs) s.obs = s.obs ? s.obs+' | '+obs : obs;
  save();closeModalD();toast(`Baixa dada: ${s.desc} -${fmt(s.valor)}`);render();
}

function desfazerBaixa(id){
  const s=S.saidas.find(x=>x.id===id);if(!s)return;
  if(!confirm('Desfazer o pagamento desta saída?'))return;
  s.pago=false;s.data_pgto=null;
  save();toast('Baixa desfeita.','warn');render();
}

function editSaida(id){
  const s=S.saidas.find(x=>x.id===id);if(!s)return;
  const mr=document.getElementById('modal-root');
  const catOpts=['Insumo / Filamento','Embalagem','Plataforma / Taxa','Energia / Conta','Equipamento / Manutenção','Frete / Envio','Marketing / Publicidade','Outro'];
  const pgtoOpts=['PIX','Dinheiro','Boleto','Cartão Débito','Cartão Crédito','Transferência','Outro'];
  const pgtoIco={'PIX':'💸','Dinheiro':'💵','Boleto':'🧾','Cartão Débito':'💳','Cartão Crédito':'💳','Transferência':'🏦','Outro':'💰'};
  mr.innerHTML=`<div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" role="dialog">
      <div class="modal-title">✏️ Editar saída <button class="modal-close" onclick="closeModalD()">×</button></div>
      <div class="form-group"><label class="form-label">Descrição</label><input class="form-control" id="es-desc" value="${s.desc}"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Categoria</label>
          <select class="form-control" id="es-cat">${catOpts.map(c=>`<option ${s.cat===c?'selected':''}>${c}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="form-label">Valor (R$)</label><input class="form-control" id="es-valor" type="number" step="0.01" value="${s.valor}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Forma de pagamento</label>
          <select class="form-control" id="es-pgto">${pgtoOpts.map(p=>`<option value="${p}" ${(s.pgto||'PIX')===p?'selected':''}>${pgtoIco[p]||'💰'} ${p}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="form-label">Fornecedor</label><input class="form-control" id="es-forn" value="${s.forn||''}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Data</label><input class="form-control" id="es-data" type="date" value="${s.data||''}"></div>
        <div class="form-group"><label class="form-label">Vencimento</label><input class="form-control" id="es-venc" type="date" value="${s.venc||''}"><div class="form-hint">Deixe vazio se não tiver prazo</div></div>
      </div>
      <div class="form-group"><label class="form-label">Observação</label><input class="form-control" id="es-obs" value="${s.obs||''}"></div>
      ${s.pago?`<div style="background:#1D9E7514;border:1px solid #1D9E7544;border-radius:var(--radius);padding:10px;font-size:13px;display:flex;justify-content:space-between;align-items:center">
        <span style="color:#1D9E75;font-weight:600">✅ Paga em ${s.data_pgto?dtFmt(s.data_pgto):'—'}</span>
        <button class="btn" style="font-size:12px;padding:4px 10px;color:var(--warning);border-color:var(--warning)" onclick="desfazerBaixa(${s.id});closeModalD()">Desfazer baixa</button>
      </div>`:''}
      <div class="modal-footer">
        <button class="btn" onclick="closeModalD()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveEditSaida(${id})"><i class="ti ti-device-floppy" style="font-size:13px"></i>Salvar</button>
      </div>
    </div></div>`;
}

function saveEditSaida(id){
  const s=S.saidas.find(x=>x.id===id);if(!s)return;
  s.desc  = document.getElementById('es-desc')?.value.trim()||s.desc;
  s.cat   = document.getElementById('es-cat')?.value||s.cat;
  s.valor = parseFloat(document.getElementById('es-valor')?.value)||s.valor;
  s.pgto  = document.getElementById('es-pgto')?.value||s.pgto||'PIX';
  s.forn  = document.getElementById('es-forn')?.value.trim()||'';
  s.data  = document.getElementById('es-data')?.value||s.data;
  s.venc  = document.getElementById('es-venc')?.value||'';
  s.obs   = document.getElementById('es-obs')?.value.trim()||'';
  save();closeModalD();toast('Saída atualizada!');render();
}

// MÓDULO PERDAS OPERACIONAIS
// ══════════════════════════════════════════
function renderPerdas(){
  const perdas = (S.producao||[]).filter(p=>p.perda);
  const totalGramas = +(perdas.reduce((a,p)=>a+(p.gramasPerda||p.gramasTotal||0),0)).toFixed(2);
  const totalTempo  = +(perdas.reduce((a,p)=>a+(p.tempo||0),0)).toFixed(1);

  // Custo estimado das perdas (gramas × custo médio/g dos filamentos)
  const custoMedio = S.filamentos.length
    ? S.filamentos.reduce((a,f)=>a+(f.preco/f.peso_total),0)/S.filamentos.length
    : 0;
  const custoEstimado = +(totalGramas * custoMedio).toFixed(2);

  // Por motivo
  const porMotivo = {};
  perdas.forEach(p=>{ const m=p.motivo_perda||'Não informado'; porMotivo[m]=(porMotivo[m]||0)+1; });

  return `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total de perdas</div>
      <div class="stat-value" style="color:var(--danger)">${perdas.length}</div>
      <div class="stat-change neutral">ocorrências registradas</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Filamento desperdiçado</div>
      <div class="stat-value" style="color:var(--danger)">${totalGramas}g</div>
      <div class="stat-change neutral">${(totalGramas/1000).toFixed(3)}kg perdidos</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tempo perdido</div>
      <div class="stat-value" style="color:var(--warning)">${totalTempo}h</div>
      <div class="stat-change neutral">horas de impressão</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Custo estimado</div>
      <div class="stat-value" style="color:var(--danger)">${fmt(custoEstimado)}</div>
      <div class="stat-change neutral">custo médio do filamento</div>
    </div>
  </div>
  ${Object.keys(porMotivo).length>0?`
  <div class="card" style="margin-bottom:14px">
    <div class="card-header"><div class="card-title">Por motivo</div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${Object.entries(porMotivo).sort((a,b)=>b[1]-a[1]).map(([m,n])=>`
        <span style="background:#E24B4A18;color:#E24B4A;border:1px solid #E24B4A44;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600">
          ⚠️ ${m} <strong>(${n})</strong>
        </span>`).join('')}
    </div>
  </div>`:''}
  <div class="card">
    <div class="card-header">
      <div class="card-title">Histórico de perdas</div>
      <button class="btn" style="color:var(--danger);border-color:var(--danger)" onclick="openModal('perda')">
        <i class="ti ti-plus" style="font-size:13px"></i>Nova perda
      </button>
    </div>
    ${perdas.length===0
      ?`<div class="empty"><i class="ti ti-mood-happy" aria-hidden="true"></i><p>Nenhuma perda registrada!</p><span>Ótimo trabalho — zero desperdício até agora 🎉</span></div>`
      :`<div class="table-wrap"><table>
        <thead><tr><th>Produto</th><th>Qtd tentada</th><th>Filamento</th><th>Gramas perdidas</th><th>Tempo perdido</th><th>Motivo</th><th>Data</th><th></th></tr></thead>
        <tbody>${perdas.slice().reverse().map(p=>{
          const fil=S.filamentos.find(f=>f.id===p.filamento_id);
          return `<tr>
            <td style="font-weight:500">${p.produto.replace('[PERDA] ','')}</td>
            <td style="text-align:center"><strong>${p.qtd_tentada||1}</strong> un</td>
            <td style="font-size:12px;color:var(--text2)">${fil?fil.tipo+' '+fil.cor+' ('+fil.marca+')':'—'}</td>
            <td style="color:var(--danger);font-weight:700">${(p.gramasPerda||p.gramasTotal||0)}g</td>
            <td style="color:var(--warning)">${p.tempo||0}h</td>
            <td><span style="font-size:11px;background:#E24B4A18;color:#E24B4A;border:1px solid #E24B4A44;border-radius:20px;padding:2px 8px">${p.motivo_perda||'—'}</span></td>
            <td style="color:var(--text3)">${dtFmt(p.data)}</td>
            <td><button class="delete-btn" onclick="delPerda(${p.id})" title="Remover"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
          </tr>`;}).join('')}
        </tbody></table></div>`}
  </div>`;
}

function delPerda(id){
  if(!confirm('Remover esta perda? O filamento NÃO será devolvido à bobina.'))return;
  S.producao = S.producao.filter(p=>p.id!==id);
  save();toast('Perda removida.','warn');render();
}

// MÓDULO PATRIMÔNIO / INVESTIMENTOS
// ══════════════════════════════════════════
function renderPatrimonio(){
  const pat = S.patrimonio || [];
  const totalInvest   = pat.reduce((a,p)=>a+p.valor_total,0);
  const totalAVista   = pat.filter(p=>p.parcelas<=1).reduce((a,p)=>a+p.valor_total,0);
  const totalParcelado= pat.filter(p=>p.parcelas>1).reduce((a,p)=>a+p.valor_total,0);
  const parcelaMensal = pat.filter(p=>p.parcelas>1).reduce((a,p)=>a+(p.valor_total/p.parcelas),0);
  const pgtoIco={'PIX':'💸','Dinheiro':'💵','Cartão Crédito':'💳','Cartão Débito':'💳','Boleto':'🧾','Financiamento':'🏦','Outro':'💰'};

  return `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total investido</div>
      <div class="stat-value" style="color:var(--accent-text)">${fmtK(totalInvest)}</div>
      <div class="stat-change neutral">${pat.length} ativo${pat.length!==1?'s':''} cadastrado${pat.length!==1?'s':''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">💸 À vista</div>
      <div class="stat-value">${fmtK(totalAVista)}</div>
      <div class="stat-change neutral">${pat.filter(p=>p.parcelas<=1).length} ativo${pat.filter(p=>p.parcelas<=1).length!==1?'s':''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">💳 Parcelado</div>
      <div class="stat-value">${fmtK(totalParcelado)}</div>
      <div class="stat-change neutral">${pat.filter(p=>p.parcelas>1).length} ativo${pat.filter(p=>p.parcelas>1).length!==1?'s':''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📅 Total parcelas/mês</div>
      <div class="stat-value" style="color:var(--warning)">${fmt(parcelaMensal)}</div>
      <div class="stat-change neutral">compromisso mensal</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Ativos e investimentos</div>
      <button class="btn btn-primary" onclick="openModal('ativo')"><i class="ti ti-plus" style="font-size:13px"></i>Novo ativo</button>
    </div>
    ${pat.length===0
      ?`<div class="empty"><i class="ti ti-building-store" aria-hidden="true"></i><p>Nenhum ativo cadastrado</p><span>Registre máquinas, móveis, equipamentos e outros investimentos</span></div>`
      :`<div class="table-wrap"><table>
        <thead><tr><th>Nº</th><th>Item</th><th>Qtd</th><th>Valor unit.</th><th>Forma pgto</th><th>Parcelas</th><th>Parcela/mês</th><th>Valor total</th><th>Data</th><th>Obs.</th><th></th></tr></thead>
        <tbody>${pat.map((p,i)=>`<tr>
          <td style="color:var(--text3);font-weight:600">${i+1}</td>
          <td style="font-weight:600">${p.item}</td>
          <td style="color:var(--text2)">${p.qtd}</td>
          <td>${fmt(p.valor_unit)}</td>
          <td>${pgtoBadge(p.forma_pgto)}</td>
          <td style="text-align:center">
            ${p.parcelas<=1
              ?`<span style="font-size:11px;color:var(--success);font-weight:600">À vista</span>`
              :`<span style="font-weight:600">${p.parcelas}x</span>`}
          </td>
          <td style="color:var(--warning);font-weight:500">${p.parcelas>1?fmt(p.valor_total/p.parcelas):'—'}</td>
          <td style="font-weight:700;color:var(--accent-text)">${fmt(p.valor_total)}</td>
          <td style="color:var(--text3);font-size:12px">${dtFmt(p.data)}</td>
          <td style="color:var(--text3);font-size:12px">${p.obs||'—'}</td>
          <td>
            <button class="edit-btn" onclick="editAtivo(${p.id})" title="Editar"><i class="ti ti-edit" aria-hidden="true"></i></button>
            <button class="delete-btn" onclick="del('patrimonio',${p.id})" title="Remover"><i class="ti ti-trash" aria-hidden="true"></i></button>
          </td>
        </tr>`).join('')}</tbody>
      </table></div>
      <div style="border-top:1px solid var(--border);padding:12px 0 0;display:flex;gap:24px;flex-wrap:wrap;font-size:13px">
        <div><span style="color:var(--text3)">Total geral investido:</span> <strong style="color:var(--accent-text)">${fmt(totalInvest)}</strong></div>
        <div><span style="color:var(--text3)">À vista (PIX/Dinheiro):</span> <strong>${fmt(totalAVista)}</strong></div>
        <div><span style="color:var(--text3)">Parcelado:</span> <strong>${fmt(totalParcelado)}</strong></div>
        <div><span style="color:var(--text3)">Parcela mensal total:</span> <strong style="color:var(--warning)">${fmt(parcelaMensal)}/mês</strong></div>
      </div>`}
  </div>`;
}

    <div class="modal" role="dialog" aria-label="${ed?'Editar':'Novo'} ativo">
      <div class="modal-title">${ed?'✏️ Editar':'🏢 Novo'} ativo / investimento <button class="modal-close" onclick="closeModalD()">×</button></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Item / Equipamento <span style="color:var(--danger)">*</span></label>
          <input class="form-control" id="at-item" placeholder="Ex: Impressora Bambu Lab A1" value="${ed?ed.item:''}">
        </div>
        <div class="form-group"><label class="form-label">Quantidade</label>
          <input class="form-control" id="at-qtd" type="number" min="1" value="${ed?ed.qtd:1}" oninput="calcAtivoTotal()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Valor unitário (R$) <span style="color:var(--danger)">*</span></label>
          <input class="form-control" id="at-vunit" type="number" min="0" step="0.01" value="${ed?ed.valor_unit:''}" oninput="calcAtivoTotal()" placeholder="0,00">
        </div>
        <div class="form-group"><label class="form-label">Valor total</label>
          <div class="form-control" id="at-vtotal" style="background:var(--surface2);color:var(--accent-text);font-weight:700">${ed?fmt(ed.valor_total):'R$ 0,00'}</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Forma de pagamento</label>
          <select class="form-control" id="at-pgto" onchange="calcAtivoTotal()">
            <option value="PIX" ${!ed||ed.forma_pgto==='PIX'?'selected':''}>💸 PIX</option>

            <option value="Boleto" ${ed&&ed.forma_pgto==='Boleto'?'selected':''}>🧾 Boleto</option>
            <option value="Financiamento" ${ed&&ed.forma_pgto==='Financiamento'?'selected':''}>🏦 Financiamento</option>

          <input class="form-control" id="at-parc" type="number" min="1" value="${ed?ed.parcelas:1}" oninput="calcAtivoTotal()">
          <div class="form-hint">1 = à vista · ex: 12 para 12x</div>
        </div>
      </div>
      <div id="at-parcela-info" style="display:none;background:var(--warning-bg);border-radius:var(--radius);padding:10px;font-size:13px;margin-bottom:8px;color:var(--warning)">
        <strong>💳 Parcela mensal: <span id="at-parcela-val">—</span></strong>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Data da compra</label>
          <input class="form-control" id="at-data" type="date" value="${ed?ed.data:todayISO()}">
        </div>
        <div class="form-group"><label class="form-label">Carência (meses)</label>
          <input class="form-control" id="at-carencia" type="number" min="0" value="${ed?ed.carencia:0}">
          <div class="form-hint">Meses antes de começar a pagar</div>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Observação</label>
        <input class="form-control" id="at-obs" placeholder="Ex: Comprado na Amazon, nota fiscal #123" value="${ed?ed.obs||'':''}">
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModalD()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveAtivo(${ed?ed.id:'null'})"><i class="ti ti-device-floppy" style="font-size:13px"></i>${ed?'Salvar':'Registrar ativo'}</button>
      </div>
    </div></div>`;
  calcAtivoTotal();
}

function calcAtivoTotal(){
  const qtd   = parseFloat(document.getElementById('at-qtd')?.value)||1;
  const vunit = parseFloat(document.getElementById('at-vunit')?.value)||0;
  const parc  = parseInt(document.getElementById('at-parc')?.value)||1;
  const total = qtd * vunit;
  const elTotal = document.getElementById('at-vtotal');
  if(elTotal) elTotal.textContent = fmt(total);
  const infoEl = document.getElementById('at-parcela-info');
  const parcEl = document.getElementById('at-parcela-val');
  if(infoEl && parcEl){
    if(parc > 1 && total > 0){
      infoEl.style.display='block';
      parcEl.textContent = fmt(total/parc) + '/mês';
    } else {
      infoEl.style.display='none';
    }
  }
}

function saveAtivo(editId){
  const item    = document.getElementById('at-item')?.value.trim();
  const qtd     = parseInt(document.getElementById('at-qtd')?.value)||1;
  const vunit   = parseFloat(document.getElementById('at-vunit')?.value)||0;
  const pgto    = document.getElementById('at-pgto')?.value||'PIX';
  const parcelas= parseInt(document.getElementById('at-parc')?.value)||1;
  const data    = document.getElementById('at-data')?.value;
  const carencia= parseInt(document.getElementById('at-carencia')?.value)||0;
  const obs     = (document.getElementById('at-obs')?.value||'').trim();
  if(!item){toast('Informe o nome do item!','err');return;}
  if(!vunit||vunit<=0){toast('Informe o valor!','err');return;}
  const valor_total = +(qtd*vunit).toFixed(2);
  if(editId && editId!=='null'){
    const ex = S.patrimonio.find(p=>p.id===editId);
    if(ex){Object.assign(ex,{item,qtd,valor_unit:vunit,valor_total,forma_pgto:pgto,parcelas,data,carencia,obs});
    save();closeModalD();toast('Ativo atualizado!');render();return;}
  }
  S.patrimonio.push({id:S.nextId++,item,qtd,valor_unit:vunit,valor_total,forma_pgto:pgto,parcelas,data,carencia,obs});
  save();closeModalD();toast(`Ativo registrado: ${item} — ${fmt(valor_total)}`);render();
}

function editAtivo(id){
  const p=S.patrimonio.find(x=>x.id===id);
  if(p) openModal_ativo(p);
}

// ─ RELATÓRIOS ─
function renderRelatorios(){
  // Meses disponíveis (baseado nas vendas)
  const mesesMap = {};
  S.vendas.forEach(v=>{
    const m = (v.data||'').slice(0,7);
    if(!m) return;
    if(!mesesMap[m]) mesesMap[m] = 0;
    mesesMap[m]++;
  });
  const mesesOrdenados = Object.keys(mesesMap).sort().reverse();
  const mesNomes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const fmtMes = m=>{ const [y,mm]=m.split('-'); return `${mesNomes[parseInt(mm,10)-1]} de ${y}`; };
  const mesAtivo = (relMesSel!=='__all__' && mesesMap[relMesSel]) ? relMesSel : '__all__';
  const noMes = (data)=> mesAtivo==='__all__' ? true : (data||'').slice(0,7)===mesAtivo;

  // Datasets filtrados pelo período selecionado
  const vendasF   = S.vendas.filter(v=>noMes(v.data));
  const producaoF = S.producao.filter(p=>noMes(p.data));
  const saidasF   = (S.saidas||[]).filter(s=>noMes(s.data));
  const patrimonioF = (S.patrimonio||[]).filter(p=>noMes(p.data));

  const totalV=vendasF.reduce((a,v)=>a+v.valor,0);
  const ticket=totalV/(vendasF.length||1);
  const totalP=producaoF.reduce((a,p)=>a+p.qtd,0);
  const horas=producaoF.reduce((a,p)=>a+p.tempo,0);
  const gramas=producaoF.reduce((a,p)=>a+(p.gramasTotal||0),0);
  const vendidas=vendasF.reduce((a,v)=>a+v.qtd,0);
  const taxaConv=totalP>0?Math.round(vendidas/totalP*100):0;
  const atac=vendasF.filter(v=>v.tipo==='Atacado').reduce((a,v)=>a+v.valor,0);
  const vare=vendasF.filter(v=>v.tipo==='Varejo').reduce((a,v)=>a+v.valor,0);
  const totalCan=atac+vare||1;
  const ml=vendasF.filter(v=>v.canal==='Mercado Livre').reduce((a,v)=>a+v.valor,0);
  const sh=vendasF.filter(v=>v.canal==='Shopee').reduce((a,v)=>a+v.valor,0);
  const ig=vendasF.filter(v=>v.canal==='Instagram').reduce((a,v)=>a+v.valor,0);
  const wpp=vendasF.filter(v=>v.canal==='WhatsApp').reduce((a,v)=>a+v.valor,0);
  const vd=vendasF.filter(v=>v.canal==='Venda Direta').reduce((a,v)=>a+v.valor,0);
  const totalCanais=ml+sh+ig+wpp+vd||1;
  const byProd={};
  vendasF.forEach(v=>{if(!byProd[v.produto])byProd[v.produto]={qtd:0,valor:0,atac:0,vare:0};byProd[v.produto].qtd+=v.qtd;byProd[v.produto].valor+=v.valor;if(v.tipo==='Atacado')byProd[v.produto].atac+=v.valor;else byProd[v.produto].vare+=v.valor;});
  const top=Object.entries(byProd).sort((a,b)=>b[1].valor-a[1].valor).slice(0,5);
  const maxTop=top[0]?top[0][1].valor:1;
  const canaisData=[
    {label:'Mercado Livre',badge:'b-ml',val:ml},{label:'Shopee',badge:'b-sh',val:sh},
    {label:'Instagram',badge:'b-ig',val:ig},{label:'WhatsApp',badge:'b-wpp',val:wpp},
    {label:'Venda Direta',badge:'b-vd',val:vd},
  ].filter(c=>c.val>0);
  // Formas de pagamento
  const pgtos = {};
  vendasF.forEach(v=>{
    const p = v.pgto||'Não informado';
    if(!pgtos[p]) pgtos[p]={valor:0,qtd:0};
    pgtos[p].valor += v.valor;
    pgtos[p].qtd   += v.qtd;

  const pgtoOrdem = ['PIX','Dinheiro','Cartão Débito','Cartão Crédito','Transferência','Outro','Não informado'];
  const pgtoCores = {'PIX':'#00B67A','Dinheiro':'#2D7A2D','Cartão Débito':'#185FA5','Cartão Crédito':'#A32D2D','Transferência':'#6B3A00','Outro':'#888780','Não informado':'#888780'};
  const pgtoIco   = {'PIX':'💸','Dinheiro':'💵','Cartão Débito':'💳','Cartão Crédito':'💳','Transferência':'🏦','Outro':'💰','Não informado':'❓'};

  const maxSP=saidaPgtoList.length?Math.max(...saidaPgtoList.map(([,v])=>v.valor)):1;

  const estoqueAtual=(S.estoque||[]).reduce((a,e)=>a+e.qtd,0);

      ?`<div style="padding:6px 4px;font-size:13px;color:var(--text3)">Exibindo dados de todo o histórico. Selecione um mês acima para ver todos os indicadores (faturamento, produção, vendas, estoque e saídas) filtrados apenas por aquele período.</div>`
      :`<div style="padding:6px 4px;font-size:13px;color:var(--text3)">Exibindo todos os indicadores abaixo referentes a <strong style="color:var(--text1)">${fmtMes(mesAtivo)}</strong>. <a href="javascript:void(0)" onclick="setRelMes('__all__')" style="color:var(--accent-text)">Ver histórico completo</a></div>`}
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Faturamento${mesAtivo!=='__all__'?` — ${fmtMes(mesAtivo)}`:''}</div><div class="stat-value" style="color:var(--success)">${fmtK(totalV)}</div><div class="stat-change neutral">${vendasF.length} venda${vendasF.length!==1?'s':''} · Ticket: ${fmtK(ticket)}</div></div>
    <div class="stat-card"><div class="stat-label">Atacado vs Varejo</div>
      <div style="margin-top:6px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span class="badge b-atac">Atacado</span><span style="font-weight:600">${Math.round(atac/totalCan*100)}%</span></div>

    </div>
    <div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span class="badge ${c.badge}">${c.label}</span>

            </div>
            <div class="progress" style="height:8px"><div class="progress-bar pr-ok" style="width:${Math.round(c.val/totalCanais*100)}%"></div></div>
          </div>`).join('')}
      </div>
      <div class="card">

        <div style="display:flex;flex-direction:column;gap:14px">
          <div><div style="font-size:12px;color:var(--text3);margin-bottom:2px">Horas de impressão</div><div style="font-size:22px;font-weight:700">${horas.toFixed(1)}h</div></div>

          <div><div style="font-size:12px;color:var(--text3);margin-bottom:2px">Receita por unidade vendida</div><div style="font-size:22px;font-weight:700;color:var(--success)">${vendidas>0?fmtK(totalV/vendidas):'—'}</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">🏢 Resumo de patrimônio${mesAtivo!=='__all__'?` — ${fmtMes(mesAtivo)}`:''}</div><button class="btn" onclick="goTo('patrimonio')" style="font-size:12px;padding:4px 10px">Ver todos</button></div>
    ${patrimonioF.length===0
      ?`<div class="empty" style="padding:16px"><span>Nenhum ativo${mesAtivo!=='__all__'?' adquirido neste período':' cadastrado'}</span></div>`
      :`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:14px">
        <div style="background:var(--accent-bg);border-radius:var(--radius);padding:12px;text-align:center">
          <div style="font-size:12px;color:var(--accent-text);font-weight:600;margin-bottom:4px">Total investido</div>

        </div>
        <div style="background:var(--surface2);border-radius:var(--radius);padding:12px;text-align:center">
          <div style="font-size:12px;color:var(--text3);font-weight:600;margin-bottom:4px">💸 À vista</div>
          <div style="font-size:20px;font-weight:700">${fmt(patrimonioF.filter(p=>p.parcelas<=1).reduce((a,p)=>a+p.valor_total,0))}</div>
        </div>
        <div style="background:var(--warning-bg);border-radius:var(--radius);padding:12px;text-align:center">
          <div style="font-size:12px;color:var(--warning);font-weight:600;margin-bottom:4px">💳 Parcelado</div>

        </div>
        <div style="background:var(--surface2);border-radius:var(--radius);padding:12px;text-align:center">
          <div style="font-size:12px;color:var(--text3);font-weight:600;margin-bottom:4px">📅 Parcela/mês</div>
          <div style="font-size:20px;font-weight:700;color:var(--warning)">${fmt(parcelaMensalR)}</div>

// ── MODAIS ──
function openModal(type){
  const mr=document.getElementById('modal-root');

  if(type==='impressora'){ openModal_impressora(); return; }
  if(type==='precificacao'){ openModal_precificacao(); return; }
  if(type==='ativo'){ openModal_ativo(null); return; }

  if(type==='perda'){
    const prodOpts = [...new Set([
      ...S.producao.filter(p=>!p.perda).map(p=>p.produto),
      ...S.estoque.map(e=>e.produto)
    ])].map(n=>`<option value="${n}">${n}</option>`).join('');
    const filOpts = S.filamentos.map(f=>`<option value="${f.id}">${f.tipo} ${f.cor} — ${f.marca} (${f.peso_restante}g)</option>`).join('');
    mr.innerHTML=`<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" role="dialog" aria-label="Nova perda">
        <div class="modal-title" style="color:var(--danger)">⚠️ Lançar perda operacional <button class="modal-close" onclick="closeModalD()" aria-label="Fechar">×</button></div>
        <div class="form-group">
          <label class="form-label">Produto <span style="color:var(--danger)">*</span></label>
          <select class="form-control" id="pd-prod">
            <option value="">Selecione o produto...</option>
            ${prodOpts}
            <option value="__outro__">Outro produto...</option>
          </select>
        </div>
        <div class="form-group" id="pd-outro-group" style="display:none">
          <label class="form-label">Nome do produto</label>
          <input class="form-control" id="pd-outro" placeholder="Descreva o produto">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Quantidade tentada</label>
            <input class="form-control" id="pd-qtd" type="number" min="1" value="1">
            <div class="form-hint">Quantas peças tentou imprimir</div>
          </div>
          <div class="form-group">
            <label class="form-label">Filamento usado <span style="color:var(--danger)">*</span></label>
            <select class="form-control" id="pd-fil">
              <option value="">Selecione a bobina...</option>${filOpts}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Gramas desperdiçadas <span style="color:var(--danger)">*</span></label>
            <input class="form-control" id="pd-gramas" type="number" min="0.01" step="0.01" placeholder="Ex: 210">
            <div class="form-hint">Total gasto na impressão com falha</div>
          </div>
          <div class="form-group">
            <label class="form-label">Tempo perdido (h)</label>
            <input class="form-control" id="pd-tempo" type="number" min="0" step="0.1" placeholder="Ex: 2.5">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Data</label>
          <input class="form-control" id="pd-data" type="date" value="${todayISO()}">
        </div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModalD()">Cancelar</button>
          <button class="btn" style="background:var(--danger);color:#fff;border:none;padding:8px 20px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer" onclick="savePerda()">
            <i class="ti ti-alert-triangle" style="font-size:13px"></i> Registrar perda
          </button>
        </div>
      </div></div>`;
    document.getElementById('pd-prod').addEventListener('change',function(){
      document.getElementById('pd-outro-group').style.display=this.value==='__outro__'?'block':'none';
    });
    return;
  }

  if(type==='producao'){
    // Monta lista de filamentos disponíveis para seleção
    const filOpts=S.filamentos.map(f=>{
      const pct=Math.round(f.peso_restante/f.peso_total*100);
      const cor=pct>30?'var(--success)':pct>15?'var(--warning)':'var(--danger)';
      return `<div class="fil-select-row" onclick="selecionarFil(${f.id},this)" data-fid="${f.id}">
        <i class="ti ti-cylinder" style="color:${cor};font-size:16px" aria-hidden="true"></i>
        <span style="flex:1;font-weight:500">${f.tipo} ${f.cor} <span style="font-size:11px;color:var(--text3);font-weight:400">· ${f.marca}</span></span>
        <span style="font-size:11px;color:${cor};font-weight:600">${f.peso_restante}g</span>
      </div>`;}).join('');

    mr.innerHTML=`<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" role="dialog" aria-label="Novo lançamento de produção">
        <div class="modal-title">Lançamento de produção <button class="modal-close" onclick="closeModalD()" aria-label="Fechar">×</button></div>
        <div class="form-group"><label class="form-label">Produto</label><input class="form-control" id="mp" placeholder="Ex: Vaso Espiral"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Quantidade produzida</label><input class="form-control" id="mq" type="number" min="1" value="1" oninput="calcGramasTotal()"></div>
          <div class="form-group"><label class="form-label">Tempo impressão/un (h)</label><input class="form-control" id="mt" type="number" min="0.1" step="0.5" value="2"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Nome/cor da peça</label><input class="form-control" id="mc" placeholder="Ex: Chaveiro Raposa Dourado"></div>
          <div class="form-group"><label class="form-label">Preço de venda (R$)</label><input class="form-control" id="mpv" type="number" min="0" step="0.01" placeholder="29,90"><div class="form-hint">Opcional — define preço no estoque</div></div>
        </div>
        <div class="form-group"><label class="form-label">Data</label><input class="form-control" id="md" type="date" value="${todayISO()}"></div>

        <div style="border-top:1px solid var(--border);margin:14px 0 10px;padding-top:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-size:13px;font-weight:600;color:var(--text2)">🎨 Filamentos usados <span style="font-size:11px;color:var(--text3);font-weight:400">(adicione 1 por cor)</span></div>
            <button class="btn" style="font-size:12px;padding:4px 10px" onclick="addFilRow()"><i class="ti ti-plus" style="font-size:12px"></i> Cor</button>
          </div>
          <div id="fil-rows"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding:6px 10px;background:var(--surface2);border-radius:var(--radius);font-size:13px">
            <span style="color:var(--text2)">Total filamento/un</span>
            <span id="mgr-total" style="font-weight:700;color:var(--accent-text)">0g</span>
          </div>
        </div>
        <div id="fil-warn" style="display:none" class="modal-warn"><i class="ti ti-alert-triangle" aria-hidden="true"></i><span id="fil-warn-msg"></span></div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModalD()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveProducao()">Salvar lançamento</button>
        </div>
      </div></div>`;
    document.getElementById('mp').focus();
    addFilRow(); // começa com 1 filamento

  } else if(type==='venda'){
    const opts=S.estoque.map(e=>`<option value="${e.produto}">${e.produto} (${e.qtd} em estoque)</option>`).join('');
    mr.innerHTML=`<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" role="dialog" aria-label="Nova venda">
        <div class="modal-title">Nova venda <button class="modal-close" onclick="closeModalD()" aria-label="Fechar">×</button></div>
        <div class="form-group">
          <label class="form-label">Tipo de venda</label>
          <div class="tipo-toggle">
            <button class="tipo-btn active-vare" id="tbv" onclick="setTipo('Varejo')">🛍 Varejo</button>
            <button class="tipo-btn" id="tba" onclick="setTipo('Atacado')">📦 Atacado</button>
          </div>
          <input type="hidden" id="m-tipo" value="Varejo">
        </div>
        <div class="form-group"><label class="form-label">Produto</label>
          <select class="form-control" id="mp" onchange="toggleOutro()">
            <option value="">Selecione...</option>${opts}
            <option value="__outro__">Outro produto...</option>

function addFilRow(){
  const container = document.getElementById('fil-rows');
  if(!container) return;
  const rid = _filRowId++;
  const opts = S.filamentos.map(f=>{
    const pct = Math.round(f.peso_restante/f.peso_total*100);
    return `<option value="${f.id}">${f.tipo} ${f.cor} — ${f.marca} (${f.peso_restante}g / ${pct}%)</option>`;
  }).join('');
  const div = document.createElement('div');
  div.id = `fil-row-${rid}`;
  div.style.cssText = 'display:grid;grid-template-columns:1fr 120px 36px;gap:8px;align-items:center;margin-bottom:8px';
  div.innerHTML = `
    <select class="form-control" id="fil-sel-${rid}" onchange="calcGramasTotal()">
      <option value="">Selecione a bobina...</option>${opts}
    </select>
    <div style="position:relative">
      <input class="form-control" id="fil-gr-${rid}" type="number" min="0.01" step="0.01" placeholder="g" oninput="calcGramasTotal()" style="padding-right:24px">
      <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text3)">g</span>
    </div>
    <button class="delete-btn" onclick="removeFilRow(${rid})" title="Remover" style="height:36px;width:36px;padding:0;display:flex;align-items:center;justify-content:center"><i class="ti ti-trash" style="font-size:14px"></i></button>`;
  container.appendChild(div);
  calcGramasTotal();
}

function removeFilRow(rid){
  const el = document.getElementById(`fil-row-${rid}`);
  if(el) el.remove();
  calcGramasTotal();
}

function calcGramasTotal(){
  const qtd = parseFloat(document.getElementById('mq')?.value) || 1;
  const rows = document.querySelectorAll('[id^="fil-gr-"]');
  let totalGr = 0;
  rows.forEach(inp => { totalGr += parseFloat(inp.value) || 0; });
  const el = document.getElementById('mgr-total');
  if(el) el.textContent = `${+(totalGr).toFixed(2)}g/un → ${+(totalGr*qtd).toFixed(2)}g total`;
  // verificar estoque de cada bobina
  const warn = document.getElementById('fil-warn');
  const warnMsg = document.getElementById('fil-warn-msg');
  let alertas = [];
  document.querySelectorAll('[id^="fil-sel-"]').forEach(sel => {
    const rid = sel.id.replace('fil-sel-','');
    const fid = parseInt(sel.value);
    const gr = parseFloat(document.getElementById(`fil-gr-${rid}`)?.value) || 0;
    if(fid && gr > 0){
      const f = S.filamentos.find(x=>x.id===fid);
      if(f && gr*qtd > f.peso_restante){
        alertas.push(`${f.tipo} ${f.cor}: precisa ${(gr*qtd).toFixed(1)}g mas só há ${f.peso_restante}g`);
      }
    }
  });
  if(warn && warnMsg){
    if(alertas.length){ warn.style.display='flex'; warnMsg.textContent=alertas.join(' | '); }
    else warn.style.display='none';
  }
}

function getFilRows(){
  // Retorna array de {filamento_id, gramas} para cada linha
  const result = [];
  document.querySelectorAll('[id^="fil-sel-"]').forEach(sel => {
    const rid = sel.id.replace('fil-sel-','');
    const fid = parseInt(sel.value);
    const gr = parseFloat(document.getElementById(`fil-gr-${rid}`)?.value) || 0;
    if(fid && gr > 0) result.push({filamento_id: fid, gramas: gr});
  });
  return result;
}

function saveProducao(){
  const p   = document.getElementById('mp')?.value.trim();
  const q   = parseInt(document.getElementById('mq')?.value)||0;
  const c   = document.getElementById('mc')?.value.trim();
  const t   = parseFloat(document.getElementById('mt')?.value)||1;
  const mpv = parseFloat(document.getElementById('mpv')?.value)||0;
  const d   = document.getElementById('md')?.value;

  if(!p){toast('Informe o nome do produto!','err');return;}
  if(!q||q<1){toast('Quantidade inválida!','err');return;}

  const filRows = getFilRows();
  if(filRows.length===0){toast('Adicione pelo menos 1 filamento e informe as gramas!','err');return;}
  for(const r of filRows){
    if(!r.filamento_id){toast('Selecione a bobina em todas as linhas!','err');return;}
    if(r.gramas<=0){toast('Informe as gramas em todos os filamentos!','err');return;}
  }

  // Verifica estoque de cada bobina
  for(const r of filRows){
    const fil = S.filamentos.find(f=>f.id===r.filamento_id);
    if(!fil){toast('Filamento não encontrado!','err');return;}
    if(r.gramas*q > fil.peso_restante){
      toast(`Filamento insuficiente: ${fil.tipo} ${fil.cor} tem ${fil.peso_restante}g mas precisa de ${(r.gramas*q).toFixed(1)}g`,'err');
      return;
    }
  }

  // Calcula totais
  const gramasTotal = +(filRows.reduce((a,r)=>a+r.gramas,0)*q).toFixed(2);
  const gramasPorUn = +(filRows.reduce((a,r)=>a+r.gramas,0)).toFixed(2);

  // Monta string de cores/materiais
  const coresStr = filRows.map(r=>{
    const f = S.filamentos.find(x=>x.id===r.filamento_id);
    return f ? `${f.tipo} ${f.cor} (${r.gramas}g)` : '';
  }).join(' + ');

  const material = filRows.length===1
    ? S.filamentos.find(f=>f.id===filRows[0].filamento_id)?.tipo || 'PLA'
    : 'MULTI';

  // Salva produção
  const prod = {
    id: S.nextId++, produto:p, qtd:q, material, cor:c||coresStr,
    tempo:t, gramas:gramasPorUn, gramasTotal,
    filamentos: filRows,           // array multicolor
    filamento_id: filRows[0].filamento_id, // compatibilidade
    preco_venda:mpv, data:d
  };
  S.producao.push(prod);

  // Desconta gramas de cada bobina
  filRows.forEach(r=>{
    const fil = S.filamentos.find(f=>f.id===r.filamento_id);
    if(fil) fil.peso_restante = Math.max(0, +(fil.peso_restante - r.gramas*q).toFixed(2));
  });

  // Atualiza estoque
  const ex = S.estoque.find(e=>e.produto.toLowerCase()===p.toLowerCase());
  if(ex){ ex.qtd+=q; if(mpv>0)ex.preco=mpv; }
  else S.estoque.push({id:S.nextId++,produto:p,qtd:q,material,preco:mpv});

  save();
  closeModalD();
  toast(`✅ ${q}x ${p} lançado! ${gramasTotal}g descontados (${filRows.length} cor${filRows.length>1?'es':''})`);
  render();
}

function savePerda(){
  let prod = document.getElementById('pd-prod')?.value;
  if(prod==='__outro__') prod = document.getElementById('pd-outro')?.value.trim();
  const qtd    = parseInt(document.getElementById('pd-qtd')?.value)||1;
  const filId  = parseInt(document.getElementById('pd-fil')?.value)||0;
  const gramas = parseFloat(document.getElementById('pd-gramas')?.value)||0;
  const tempo  = parseFloat(document.getElementById('pd-tempo')?.value)||0;
  const motivo = document.getElementById('pd-motivo')?.value||'Outro';
  const data   = document.getElementById('pd-data')?.value;

  if(!prod){toast('Selecione ou informe o produto!','err');return;}
  if(!filId){toast('Selecione o filamento!','err');return;}
  if(!gramas||gramas<=0){toast('Informe as gramas desperdiçadas!','err');return;}

  const fil = S.filamentos.find(f=>f.id===filId);
  if(!fil){toast('Filamento não encontrado!','err');return;}
  if(gramas > fil.peso_restante){
    if(!confirm(`Atenção: ${fil.tipo} ${fil.cor} tem apenas ${fil.peso_restante}g. Continuar mesmo assim?`))return;
  }

  fil.peso_restante = Math.max(0, +(fil.peso_restante - gramas).toFixed(2));

  S.producao.push({
    id: S.nextId++,
    produto: prod, qtd_tentada: qtd,
    qtd: 0, material: fil.tipo, cor: fil.cor,
    tempo, gramas, gramasTotal: gramas, gramasPerda: gramas,
    filamentos: [{filamento_id:filId, gramas}],
    filamento_id: filId,
    preco_venda: 0,
    perda: true, motivo_perda: motivo, data,
  });

  save(); closeModalD();
  toast(`⚠️ Perda registrada: ${gramas}g de ${fil.tipo} ${fil.cor} — ${motivo}`,'warn');
  goTo('perdas');
}

function saveVenda(){
  let p=document.getElementById('mp')?.value;
  if(p==='__outro__')p=document.getElementById('mp-outro')?.value.trim();
  const q=parseInt(document.getElementById('mq')?.value)||0;
  const can=document.getElementById('mcan')?.value;
  const tipo=document.getElementById('m-tipo')?.value||'Varejo';
  const v=parseFloat(document.getElementById('mv')?.value)||0;
  const d=document.getElementById('md')?.value;
  const cliente=(document.getElementById('m-cliente')?.value||'').trim();
  const pgto=(document.getElementById('m-pgto')?.value||'PIX');
  if(!p||p===''){toast('Selecione um produto!','err');return;}
  if(!q||q<1){toast('Quantidade inválida!','err');return;}
  if(!v||v<=0){toast('Informe o valor da venda!','err');return;}
  S.vendas.push({id:S.nextId++,produto:p,qtd:q,canal:can,tipo,valor:v,cliente,pgto,data:d});
  const ex=S.estoque.find(e=>e.produto.toLowerCase()===p.toLowerCase());
  if(ex){
    if(ex.qtd<q){toast(`Atenção: estoque insuficiente (${ex.qtd} un). Venda registrada mesmo assim.`,'warn');}
    ex.qtd=Math.max(0,ex.qtd-q);
  }
  save();closeModalD();toast(`Venda ${tipo} registrada!${cliente?' → '+cliente:''}`);render();
}

  const desc  = document.getElementById('sa-desc')?.value.trim();

  const pgto  = document.getElementById('sa-pgto')?.value||'PIX';
